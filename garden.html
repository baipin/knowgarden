<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | My Plants</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <script src="/js/lang.js"></script>
    <style>
        :root { --max-width: 1200px; }
        body {
            background-color: var(--mdui-color-surface-container-lowest);
            color: var(--mdui-color-on-surface);
            padding-bottom: 50px;
        }
        .garden-header { text-align: center; margin: 60px 0 40px; }
        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
        }
        mdui-card { transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer; }
        mdui-card:hover { transform: translateY(-5px); box-shadow: var(--mdui-elevation-level3); }
        .tag-chip { margin-right: 8px; margin-top: 8px; }
        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--mdui-color-primary);
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }
        footer {
            padding: 40px 24px;
            text-align: center;
            background-color: var(--mdui-color-surface-container-low);
            margin-top: 80px;
        }
        .admin-tools {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar variant="flat">
            <mdui-button-icon icon="arrow_back" onclick="window.location.href='index.html'"></mdui-button-icon>
            <mdui-top-app-bar-title data-i18n="navGarden">My Garden</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>
            
            <mdui-dropdown>
                <mdui-button-icon icon="language" slot="trigger"></mdui-button-icon>
                <mdui-menu id="language-menu">
                    <mdui-menu-item value="zh-cn">简体中文</mdui-menu-item>
                    <mdui-menu-item value="zh-tw">繁體中文</mdui-menu-item>
                    <mdui-menu-item value="en">English</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>

            <mdui-button-icon icon="refresh" id="refresh-btn"></mdui-button-icon>
        </mdui-top-app-bar>

        <mdui-layout-main>
            <div class="garden-header">
                <h1 class="mdui-typo-display-medium" data-i18n="navGarden">Knowledge Garden</h1>
                <p style="opacity: 0.7;" data-i18n="subtitle">Cultivating seeds of inspiration</p>
            </div>

            <div class="knowledge-grid" id="garden-container"></div>

            <div id="empty-state" style="text-align: center; margin-top: 100px; display: none;">
                <mdui-icon name="filter_vintage" style="font-size: 80px; opacity: 0.2;"></mdui-icon>
                <p>Garden is empty.</p>
                <mdui-button variant="tonal" href="index.html" data-i18n="navSow">Go Sow</mdui-button>
            </div>

            <footer>
                <div class="admin-tools">
                    <mdui-button variant="outlined" icon="file_download" id="export-btn">导出备份</mdui-button>
                    <mdui-button variant="outlined" icon="file_upload" id="import-btn">导入备份</mdui-button>
                    <mdui-button variant="outlined" icon="delete_sweep" color="error" id="clear-btn">清空花园</mdui-button>
                    <input type="file" id="file-input" style="display: none;" accept=".json">
                </div>

                <div class="mdui-typo-body-medium" style="opacity: 0.6;" data-i18n="footerCopy">© 2026 Knowledge Garden</div>
                <div style="margin-top: 12px;">
                    <a href="https://github.com/baipin/knowgarden" target="_blank" style="text-decoration: none;">
                        <mdui-button variant="tonal" icon="code">GitHub</mdui-button>
                    </a>
                </div>
            </footer>
        </mdui-layout-main>
    </mdui-layout>

    <script>
        const container = document.querySelector('#garden-container');
        const emptyState = document.querySelector('#empty-state');
        const refreshBtn = document.querySelector('#refresh-btn');
        const langMenu = document.querySelector('#language-menu');
        
        // 数据工具按钮
        const exportBtn = document.querySelector('#export-btn');
        const importBtn = document.querySelector('#import-btn');
        const clearBtn = document.querySelector('#clear-btn');
        const fileInput = document.querySelector('#file-input');

        /**
         * 1. 多语言逻辑
         */
        function applyLanguage(lang) {
            if (typeof i18n === 'undefined') return;
            const data = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.textContent = data[key];
            });
            localStorage.setItem('user_lang', lang);
            loadGarden(); // 重新渲染卡片
        }

        langMenu.addEventListener('change', (e) => applyLanguage(e.target.value));

        /**
         * 2. 核心加载逻辑
         */
        window.addEventListener('load', () => {
            const savedLang = localStorage.getItem('user_lang') || 'zh-cn';
            applyLanguage(savedLang);
        });

        refreshBtn.addEventListener('click', loadGarden);

        function loadGarden() {
            container.innerHTML = '';
            const localData = JSON.parse(localStorage.getItem('garden_history') || '[]');
            if (localData.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                renderCards(localData);
            }
        }

        function renderCards(dataList) {
            const lang = localStorage.getItem('user_lang') || 'zh-cn';
            const langPack = i18n[lang];

            dataList.forEach(item => {
                const card = document.createElement('mdui-card');
                card.variant = "elevated";
                card.style.width = "100%";
                card.innerHTML = `
                    <div style="padding: 20px;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div style="font-size: 20px; font-weight: bold; margin-bottom: 12px;">🌱 ${item.title || 'Knowledge'}</div>
                            <span style="font-size: 12px; opacity: 0.5;">${item.created_at || ''}</span>
                        </div>
                        <span class="section-label">${langPack.agent1.split(':')[0]}</span>
                        <p style="margin-top: 0; line-height: 1.6;">${item.summary}</p>
                        <mdui-divider style="margin: 16px 0;"></mdui-divider>
                        <span class="section-label">${langPack.agent2.split(':')[0]}</span>
                        <div style="margin-bottom: 16px;">${formatTags(item.connections)}</div>
                        <div style="background-color: var(--mdui-color-secondary-container); padding: 12px; border-radius: 8px;">
                            <span class="section-label" style="color: var(--mdui-color-on-secondary-container);">${langPack.agent3.split(':')[0]}</span>
                            <p style="margin: 0; font-size: 14px;">${item.growth_plan}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function formatTags(tagsString) {
            if (!tagsString) return "";
            const tags = tagsString.split(/[，,、\s]+/).slice(0, 5);
            return tags.map(tag => `<mdui-chip class="tag-chip" variant="filled">${tag}</mdui-chip>`).join('');
        }

        /**
         * 3. 数据维护功能 (备份与清空)
         */
        // 导出备份
        exportBtn.addEventListener('click', () => {
            const data = localStorage.getItem('garden_history') || '[]';
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `garden_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // 导入备份
        importBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);
                    const localData = JSON.parse(localStorage.getItem('garden_history') || '[]');
                    // 合并数据并去重（基于创建时间）
                    const combined = [...importedData, ...localData];
                    const unique = Array.from(new Set(combined.map(a => a.id)))
                                     .map(id => combined.find(a => a.id === id));
                    
                    localStorage.setItem('garden_history', JSON.stringify(unique));
                    loadGarden();
                    alert("导入成功！已合并数据。");
                } catch (err) {
                    alert("非法文件格式！");
                }
            };
            reader.readAsText(file);
        });

        // 清空花园
        clearBtn.addEventListener('click', () => {
            if(confirm("确定要拔掉所有的知识植物吗？此操作不可撤销。\nAre you sure to clear all plants?")) {
                localStorage.removeItem('garden_history');
                loadGarden();
            }
        });
    </script>
</body>
</html>
