<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | My Plants</title>

    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script src="/js/lang.js"></script>

    <style>
        :root { --max-width: 1200px; }
        body {
            background-color: var(--mdui-color-surface-container-lowest);
            color: var(--mdui-color-on-surface);
            padding-bottom: 50px;
            margin: 0;
        }
        .garden-header { text-align: center; margin: 60px 0 40px; padding: 0 20px; }
        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
        }
        mdui-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        mdui-card:hover { transform: translateY(-5px); box-shadow: var(--mdui-elevation-level3); }
        .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .card-title { font-size: 20px; font-weight: bold; line-height: 1.4; word-break: break-word; flex-grow: 1; }
        .card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
        .card-date { font-size: 11px; opacity: 0.6; white-space: nowrap; }
        .model-tag {
            font-size: 10px; padding: 2px 6px; border-radius: 4px;
            background-color: var(--mdui-color-surface-container-highest);
            color: var(--mdui-color-primary); text-transform: uppercase; font-weight: bold;
        }
        .tag-chip { margin-right: 8px; margin-top: 8px; }
        .section-label {
            font-size: 12px; text-transform: uppercase; color: var(--mdui-color-primary);
            font-weight: bold; margin-bottom: 6px; display: block; letter-spacing: 0.4px;
        }
        .markdown-body { font-size: 14px; line-height: 1.6; word-break: break-word; }
        .growth-box {
            background-color: var(--mdui-color-secondary-container);
            color: var(--mdui-color-on-secondary-container);
            padding: 12px; border-radius: 12px; margin-top: 8px;
        }
        .card-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 8px 16px 16px; margin-top: auto; }
        footer { padding: 40px 24px; text-align: center; background-color: var(--mdui-color-surface-container-low); margin-top: 80px; }
        .admin-tools { margin-bottom: 24px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .empty-state { text-align: center; margin-top: 100px; display: none; padding: 0 20px; }
        .katex-display { overflow-x: auto; overflow-y: hidden; }
        #refresh-btn { transition: transform 0.5s ease; }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar variant="flat">
            <mdui-button-icon icon="menu" id="drawer-trigger"></mdui-button-icon>
            <mdui-top-app-bar-title data-i18n="navGarden">My Garden</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>

            <mdui-dropdown>
                <mdui-button-icon icon="language" slot="trigger"></mdui-button-icon>
                <mdui-menu id="language-menu" selects="single">
                    <mdui-menu-item value="zh-cn">简体中文</mdui-menu-item>
                    <mdui-menu-item value="zh-tw">繁體中文</mdui-menu-item>
                    <mdui-menu-item value="en">English</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>

            <mdui-button-icon icon="refresh" id="refresh-btn"></mdui-button-icon>
        </mdui-top-app-bar>

        <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
            <div style="padding: 16px;">
                <div class="mdui-typo-title" data-i18n="title">Knowledge Garden</div>
            </div>
            <mdui-list>
                <mdui-list-item icon="add_box" href="index.html"><span data-i18n="navSow">Go Sow</span></mdui-list-item>
                <mdui-list-item icon="local_florist" href="garden.html" selected><span data-i18n="navGarden">My Garden</span></mdui-list-item>
            </mdui-list>
        </mdui-navigation-drawer>

        <mdui-layout-main>
            <div class="garden-header">
                <h1 class="mdui-typo-display-medium" data-i18n="navGarden">Knowledge Garden</h1>
                <p style="opacity: 0.7;" data-i18n="subtitle">Cultivating seeds of inspiration</p>
            </div>

            <div class="knowledge-grid" id="garden-container"></div>

            <div id="empty-state" class="empty-state">
                <mdui-icon name="filter_vintage" style="font-size: 80px; opacity: 0.2;"></mdui-icon>
                <p data-i18n="gardenEmpty">Garden is empty.</p>
                <mdui-button variant="tonal" href="index.html"><span data-i18n="navSow">Go Sow</span></mdui-button>
            </div>

            <footer>
                <div class="admin-tools">
                    <mdui-button variant="outlined" icon="file_download" id="export-btn"><span data-i18n="gardenExport">导出备份</span></mdui-button>
                    <mdui-button variant="outlined" icon="file_upload" id="import-btn"><span data-i18n="gardenImport">导入备份</span></mdui-button>
                    <mdui-button variant="outlined" icon="delete_sweep" color="error" id="clear-btn"><span data-i18n="gardenClear">清空花园</span></mdui-button>
                    <input type="file" id="file-input" style="display: none;" accept=".json">
                </div>
                <div class="mdui-typo-body-medium" style="opacity: 0.6;">
                    <p data-i18n="footerCopy"> © 2026 Knowledge Garden </p>
                </div>
            </footer>
        </mdui-layout-main>
    </mdui-layout>

    <script>
        // --- 1. 获取 DOM 元素 ---
        const container = document.querySelector('#garden-container');
        const emptyState = document.querySelector('#empty-state');
        const refreshBtn = document.querySelector('#refresh-btn');
        const langMenu = document.querySelector('#language-menu');
        const drawer = document.querySelector('#main-drawer');
        const drawerTrigger = document.querySelector('#drawer-trigger');
        const exportBtn = document.querySelector('#export-btn');
        const importBtn = document.querySelector('#import-btn');
        const clearBtn = document.querySelector('#clear-btn');
        const fileInput = document.querySelector('#file-input');

        // --- 2. 国际化辅助 ---
        function getCurrentLang() { return localStorage.getItem('user_lang') || 'zh-cn'; }
        function getLangPack() {
            const lang = getCurrentLang();
            return (typeof i18n !== 'undefined' && i18n[lang]) ? i18n[lang] : {};
        }
        function t(key, fallback = '') {
            const pack = getLangPack();
            return pack[key] || fallback || key;
        }

        // --- 3. 核心功能：数据渲染 ---
        function loadGarden() {
            console.log("Garden UI Refreshing...");
            container.innerHTML = '';
            const rawData = localStorage.getItem('garden_history') || '[]';
            let dataList = [];
            
            try {
                dataList = JSON.parse(rawData).sort((a, b) => {
                    return new Date(b.created_at || b.id) - new Date(a.created_at || a.id);
                });
            } catch (e) { dataList = []; }

            if (dataList.length === 0) {
                emptyState.style.display = 'block';
                container.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                container.style.display = 'grid';
                renderCards(dataList);
            }
        }

        function renderCards(dataList) {
            const pack = getLangPack();
            const a1Title = (pack.agent1 || 'Ingestion').split(':')[0];
            const a2Title = (pack.agent2 || 'Association').split(':')[0];
            const a3Title = (pack.agent3 || 'Synthesis').split(':')[0];

            dataList.forEach(item => {
                const card = document.createElement('mdui-card');
                card.variant = 'elevated';
                
                // 内部 HTML 渲染逻辑
                const id = item.id || Date.now();
                card.innerHTML = `
                    <div style="padding: 20px;">
                        <div class="card-header-row">
                            <div class="card-title">🌱 ${escapeHtml(item.title || t('gardenUntitled'))}</div>
                            <div class="card-meta">
                                <div class="model-tag">${escapeHtml(item.model_used || 'Agent')}</div>
                                <div class="card-date">${escapeHtml(item.created_at || '')}</div>
                            </div>
                        </div>
                        <span class="section-label">${escapeHtml(a1Title)}</span>
                        <div class="markdown-body">${marked.parse(item.summary || '')}</div>
                        <mdui-divider style="margin: 16px 0;"></mdui-divider>
                        <span class="section-label">${escapeHtml(a2Title)}</span>
                        <div style="margin-bottom: 16px;">${formatTags(item.connections || item.tags)}</div>
                        <div class="growth-box">
                            <span class="section-label" style="color: inherit;">${escapeHtml(a3Title)}</span>
                            <div class="markdown-body" style="margin: 0;">${marked.parse(item.growth_plan || item.plan || '')}</div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <mdui-button-icon icon="content_copy" onclick="window.copyCard('${id}')"></mdui-button-icon>
                        <mdui-button-icon icon="delete_outline" color="error" onclick="window.deleteCard('${id}')"></mdui-button-icon>
                    </div>
                `;
                container.appendChild(card);
            });

            if (window.renderMathInElement) {
                renderMathInElement(container, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false }
                    ],
                    throwOnError: false
                });
            }
        }

        // --- 4. 辅助函数 ---
        function escapeHtml(str) { return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }
        function formatTags(tags) {
            if (!tags) return '';
            const tArray = Array.isArray(tags) ? tags : String(tags).split(/[，,、\n]+/).map(t => t.trim()).filter(Boolean);
            return tArray.slice(0, 6).map(tag => `<mdui-chip class="tag-chip" variant="filled">${escapeHtml(tag)}</mdui-chip>`).join('');
        }

        // --- 5. 挂载全局交互函数 ---
        window.deleteCard = function(id) {
            if (!confirm(t('confirmDelete', '确定要删除这条灵感吗？'))) return;
            const history = JSON.parse(localStorage.getItem('garden_history') || '[]');
            const updated = history.filter(item => String(item.id) !== String(id));
            localStorage.setItem('garden_history', JSON.stringify(updated));
            loadGarden();
            mdui.snackbar({ message: t('deleteDone', '已删除'), closeable: true });
        };

        window.copyCard = async function(id) {
            const history = JSON.parse(localStorage.getItem('garden_history') || '[]');
            const item = history.find(i => String(i.id) === String(id));
            if (!item) return;
            const text = `【${item.title}】\n摘要：${item.summary}\n计划：${item.growth_plan}`;
            try {
                await navigator.clipboard.writeText(text);
                mdui.snackbar({ message: t('copySuccess', '已复制到剪贴板'), closeable: true });
            } catch (err) { console.error(err); }
        };

        // --- 6. 事件监听与初始化 ---
        window.addEventListener('DOMContentLoaded', () => {
            // 初始化侧边栏
            drawerTrigger.onclick = () => { drawer.open = !drawer.open; };

            // 刷新按钮动画与逻辑
            refreshBtn.onclick = () => {
                refreshBtn.style.transform = 'rotate(360deg)';
                loadGarden();
                setTimeout(() => { refreshBtn.style.transform = 'rotate(0deg)'; }, 500);
            };

            // 语言切换
            langMenu.addEventListener('change', () => {
                const lang = langMenu.value;
                localStorage.setItem('user_lang', lang);
                applyLanguage(lang);
            });

            // 初始化
            const currentLang = getCurrentLang();
            langMenu.value = currentLang;
            applyLanguage(currentLang);
        });

        function applyLanguage(lang) {
            const data = (typeof i18n !== 'undefined' && i18n[lang]) ? i18n[lang] : {};
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.textContent = data[key];
            });
            document.title = `Garden | ${data.navGarden || 'My Plants'}`;
            loadGarden();
        }

        // --- 备份管理 ---
        exportBtn.onclick = () => {
            const data = localStorage.getItem('garden_history') || '[]';
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `garden_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        };

        importBtn.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    localStorage.setItem('garden_history', JSON.stringify(data));
                    loadGarden();
                    mdui.snackbar({ message: "Import Success", closeable: true });
                } catch (err) { mdui.snackbar({ message: "Invalid JSON", closeable: true }); }
            };
            reader.readAsText(file);
        };

        clearBtn.onclick = () => {
            if (confirm(t('gardenClearConfirm', '确定清空所有数据吗？'))) {
                localStorage.removeItem('garden_history');
                loadGarden();
            }
        };
    </script>
</body>
</html>
