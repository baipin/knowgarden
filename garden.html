<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | My Plants</title>

    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script src="/js/lang.js"></script>

    <style>
        :root { --max-width: 1200px; }

        body {
            background-color: var(--mdui-color-surface-container-lowest);
            color: var(--mdui-color-on-surface);
            padding-bottom: 50px;
            margin: 0;
        }

        .garden-header { text-align: center; margin: 60px 0 40px; padding: 0 20px; }

        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
        }

        mdui-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        mdui-card:hover { transform: translateY(-5px); box-shadow: var(--mdui-elevation-level3); }
        mdui-card[selected] { outline: 3px solid var(--mdui-color-primary); box-shadow: var(--mdui-elevation-level4); }

        .card-checkbox { position: absolute; top: 12px; right: 12px; z-index: 2; pointer-events: none; }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 12px;
            padding-right: 32px;
        }

        /* 标题编辑样式 */
        .card-title {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.4;
            word-break: break-word;
            flex-grow: 1;
            padding: 2px 4px;
            border-radius: 4px;
            transition: background 0.2s;
            outline: none;
        }
        .card-title:hover { background: var(--mdui-color-surface-container-high); }
        .card-title:focus { background: var(--mdui-color-surface-container-highest); border-bottom: 2px solid var(--mdui-color-primary); }

        .card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
        .card-date { font-size: 11px; opacity: 0.6; white-space: nowrap; }

        /* --- Agent 2 多行纵向滚动样式 (保留) --- */
        .tags-outer-container {
            position: relative;
            margin-bottom: 12px;
            background: var(--mdui-color-surface-container-low);
            border-radius: 8px;
            padding: 8px;
        }
        .tags-scroll-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 90px;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            scrollbar-width: thin;
        }
        .tags-scroll-container::-webkit-scrollbar { width: 5px; }
        .tags-scroll-container::-webkit-scrollbar-thumb { background: var(--mdui-color-outline-variant); border-radius: 10px; }

        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--mdui-color-primary);
            font-weight: bold;
            margin-bottom: 6px;
            display: block;
        }

        .markdown-body { font-size: 14px; line-height: 1.6; word-break: break-word; }
        .growth-box {
            background-color: var(--mdui-color-secondary-container);
            color: var(--mdui-color-on-secondary-container);
            padding: 12px;
            border-radius: 12px;
            margin-top: 8px;
        }

        /* 折叠逻辑样式 */
        .card-body { transition: max-height 0.3s ease-out, opacity 0.2s; overflow: hidden; }
        mdui-card[collapsed] .card-body { max-height: 0 !important; opacity: 0; padding: 0 !important; }
        mdui-card[collapsed] .card-actions { border-top: 1px solid var(--mdui-color-outline-variant); }

        .card-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 8px 16px 16px; margin-top: auto; }

        .fab-combine { position: fixed; bottom: 30px; right: 30px; display: none; z-index: 100; align-items: center; gap: 10px; }
        footer { padding: 40px 24px; text-align: center; background-color: var(--mdui-color-surface-container-low); margin-top: 80px; }
        .empty-state { text-align: center; margin-top: 100px; display: none; }
        .rotating { animation: mdui-rotate 0.8s linear; }
        @keyframes mdui-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar scroll-behavior="elevate">
            <mdui-button-icon icon="menu" id="drawer-trigger"></mdui-button-icon>
            <mdui-top-app-bar-title data-i18n="navGarden">My Garden</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>
            <mdui-dropdown>
                <mdui-button-icon icon="language" slot="trigger"></mdui-button-icon>
                <mdui-menu id="language-menu" selects="single">
                    <mdui-menu-item value="zh-cn">简体中文</mdui-menu-item>
                    <mdui-menu-item value="zh-tw">繁體中文</mdui-menu-item>
                    <mdui-menu-item value="en">English</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
            <mdui-button-icon icon="refresh" id="refresh-btn"></mdui-button-icon>
        </mdui-top-app-bar>

        <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
            <div style="padding: 16px;"><div class="mdui-typo-title" data-i18n="title">Knowledge Garden</div></div>
            <mdui-list>
                <mdui-list-item icon="add_box" href="index.html"><span data-i18n="navSow">Go Sow</span></mdui-list-item>
                <mdui-list-item icon="local_florist" href="garden.html" selected><span data-i18n="navGarden">My Garden</span></mdui-list-item>
            </mdui-list>
        </mdui-navigation-drawer>

        <mdui-layout-main>
            <div class="garden-header">
                <h1 class="mdui-typo-display-medium" data-i18n="navGarden">Knowledge Garden</h1>
            </div>
            <div class="knowledge-grid" id="garden-container"></div>
            <div id="empty-state" class="empty-state">
                <p data-i18n="gardenEmpty">Garden is empty.</p>
            </div>

            <div class="fab-combine" id="combine-fab">
                <mdui-button variant="filled" icon="auto_fix_high" id="combine-btn"><span id="combine-btn-text">Combine Seeds</span></mdui-button>
                <mdui-button-icon icon="close" onclick="clearSelection()"></mdui-button-icon>
            </div>
        </mdui-layout-main>
    </mdui-layout>

    <mdui-dialog id="ppt-dialog" close-on-overlay-click style="--mdui-dialog-width: 800px;">
        <span slot="headline">Presentation Outline</span>
        <div id="ppt-content"></div>
        <mdui-button slot="action" variant="text" id="copy-marp-btn">Copy</mdui-button>
    </mdui-dialog>

    <script>
        const container = document.querySelector('#garden-container');
        const emptyState = document.querySelector('#empty-state');
        const langMenu = document.querySelector('#language-menu');
        let selectedIds = new Set();

        function t(k) { return (typeof i18n !== 'undefined' && i18n[getCurrentLang()]?.[k]) || k; }
        function getCurrentLang() { return localStorage.getItem('user_lang') || 'zh-cn'; }
        function escapeHtml(v) { return String(v ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": "&#39;" }[m])); }
        function renderContent(text) { return text ? `<div class="markdown-body">${marked.parse(text)}</div>` : ''; }

        // Agent 2 渲染逻辑：多行纵向滚动
        function formatTags(tagsString) {
            if (!tagsString) return '';
            const tags = String(tagsString).split(/[，,、\n]+/).map(t => t.trim()).filter(Boolean);
            const chips = tags.map(tag => `<mdui-chip class="tag-chip" variant="filled">${escapeHtml(tag)}</mdui-chip>`).join('');
            return `<div class="tags-outer-container"><div class="tags-scroll-container">${chips}</div></div>`;
        }

        function readGardenData() { return JSON.parse(localStorage.getItem('garden_history') || '[]').sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)); }

        // 功能：更新标题
        function updateTitle(id, newTitle) {
            const data = readGardenData();
            const idx = data.findIndex(i => String(i.id) === String(id));
            if(idx !== -1) {
                data[idx].title = newTitle;
                localStorage.setItem('garden_history', JSON.stringify(data));
            }
        }

        // 功能：折叠切换
        function toggleCollapse(card) {
            if (card.hasAttribute('collapsed')) card.removeAttribute('collapsed');
            else card.setAttribute('collapsed', '');
        }

        function loadGarden() {
            container.innerHTML = '';
            const localData = readGardenData();
            if (localData.length === 0) { emptyState.style.display = 'block'; return; }
            emptyState.style.display = 'none';

            const langPack = (typeof i18n !== 'undefined' && i18n[getCurrentLang()]) || {};
            const a1T = (langPack.agent1 || 'Summary').split(':')[0];
            const a2T = (langPack.agent2 || 'Connections').split(':')[0];
            const a3T = (langPack.agent3 || 'Growth').split(':')[0];

            localData.forEach(item => {
                const card = document.createElement('mdui-card');
                card.variant = 'elevated';
                const id = String(item.id);
                
                card.onclick = (e) => {
                    // 排除点击动作条、标签区和标题编辑区
                    if (e.target.closest('.card-actions') || e.target.closest('.tags-scroll-container') || e.target.closest('.card-title')) return;
                    toggleSelect(id, card);
                };

                card.innerHTML = `
                    <mdui-checkbox class="card-checkbox" ${selectedIds.has(id) ? 'checked' : ''}></mdui-checkbox>
                    <div style="padding: 20px;">
                        <div class="card-header-row">
                            <div class="card-title" contenteditable="true" spellcheck="false">🌱 ${escapeHtml(item.title || 'Untitled')}</div>
                            <div class="card-meta">
                                <div class="model-tag">${escapeHtml(item.model_used || 'AI')}</div>
                                <div class="card-date">${escapeHtml(item.created_at || '')}</div>
                            </div>
                        </div>

                        <div class="card-body">
                            <span class="section-label">${escapeHtml(a1T)}</span>
                            <div class="content-text">${renderContent(item.summary)}</div>
                            <mdui-divider style="margin: 16px 0;"></mdui-divider>
                            <span class="section-label">${escapeHtml(a2T)}</span>
                            ${formatTags(item.connections)}
                            <div class="growth-box">
                                <span class="section-label" style="color: inherit;">${escapeHtml(a3T)}</span>
                                <div class="content-text" style="margin: 0;">${renderContent(item.growth_plan)}</div>
                            </div>
                        </div>
                    </div>

                    <div class="card-actions">
                        <mdui-button-icon icon="unfold_less" class="collapse-btn" title="折叠/展开"></mdui-button-icon>
                        <div style="flex-grow:1"></div>
                        <mdui-button-icon icon="present_to_all" onclick="generatePPT('${id}')"></mdui-button-icon>
                        <mdui-button-icon icon="delete_outline" color="error" onclick="deleteCard('${id}')"></mdui-button-icon>
                    </div>
                `;

                // 标题编辑监听
                const titleEl = card.querySelector('.card-title');
                titleEl.onblur = () => {
                    const cleanTitle = titleEl.innerText.replace('🌱 ', '').trim();
                    updateTitle(id, cleanTitle);
                };
                titleEl.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } };

                // 折叠按钮监听
                card.querySelector('.collapse-btn').onclick = () => toggleCollapse(card);

                container.appendChild(card);
            });
            if (window.renderMathInElement) renderMathInElement(container, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }] });
        }

        function toggleSelect(id, card) {
            const cb = card.querySelector('.card-checkbox');
            if (selectedIds.has(id)) { selectedIds.delete(id); card.removeAttribute('selected'); cb.checked = false; }
            else { selectedIds.add(id); card.setAttribute('selected', ''); cb.checked = true; }
            const count = selectedIds.size;
            document.querySelector('#combine-fab').style.display = count >= 2 ? 'flex' : 'none';
        }

        function deleteCard(id) { if(confirm('Delete?')) { localStorage.setItem('garden_history', JSON.stringify(readGardenData().filter(i=>String(i.id)!==id))); loadGarden(); } }

        window.onload = () => {
            if(typeof i18n !== 'undefined') {
                const lang = getCurrentLang();
                langMenu.value = lang;
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const k = el.getAttribute('data-i18n');
                    if(i18n[lang][k]) el.textContent = i18n[lang][k];
                });
            }
            loadGarden();
        };

        langMenu.onchange = () => { localStorage.setItem('user_lang', langMenu.value); location.reload(); };
        document.querySelector('#refresh-btn').onclick = () => loadGarden();
        document.querySelector('#drawer-trigger').onclick = () => document.querySelector('#main-drawer').open = true;
    </script>
</body>
</html>
