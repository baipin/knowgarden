<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | My Plants</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <style>
        :root {
            --max-width: 1200px;
        }

        body {
            background-color: var(--mdui-color-surface-container-lowest);
            color: var(--mdui-color-on-surface);
            padding-bottom: 50px;
        }

        .garden-header {
            text-align: center;
            margin: 60px 0 40px;
        }

        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
        }
        /* 知识卡片动效 */
        mdui-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

            mdui-card:hover {
                transform: translateY(-5px);
                box-shadow: var(--mdui-elevation-level3);
            }

        .tag-chip {
            margin-right: 8px;
            margin-top: 8px;
        }

        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--mdui-color-primary);
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar variant="flat">
            <mdui-button-icon icon="arrow_back" onclick="window.location.href='index.html'"></mdui-button-icon>
            <mdui-top-app-bar-title>我的知识花园</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>
            <mdui-button-icon icon="refresh" id="refresh-btn"></mdui-button-icon>
        </mdui-top-app-bar>

        <mdui-layout-main>
            <div class="garden-header">
                <h1 class="mdui-typo-display-medium">茁壮成长的知识</h1>
                <p style="opacity: 0.7;">这里存放着由 Agent 链培育的所有灵感种子</p>
            </div>

            <div class="knowledge-grid" id="garden-container">
            </div>

            <div id="empty-state" style="text-align: center; margin-top: 100px; display: none;">
                <mdui-icon name="filter_vintage" style="font-size: 80px; opacity: 0.2;"></mdui-icon>
                <p>花园还是空的，快去“播种”吧！</p>
                <mdui-button variant="tonal" href="index.html">前往播种</mdui-button>
            </div>
        </mdui-layout-main>
    </mdui-layout>

    <script>
        // 等待 DOM 和 mdui 组件完全加载后再执行
        document.addEventListener('DOMContentLoaded', () => {
            const drawer = document.querySelector('#main-drawer');
            const trigger = document.querySelector('#drawer-trigger');

            if (!drawer || !trigger) {
                console.error('抽屉或触发按钮未找到，请检查 ID 是否正确');
                return;
            }

            // 点击菜单按钮切换抽屉
            trigger.addEventListener('click', () => {
                drawer.opened = !drawer.opened;
            });

            // 点击遮罩层时自动关闭
            drawer.addEventListener('click', (e) => {
                if (e.target === drawer) {
                    drawer.opened = false;
                }
            });

            console.log('mdui 抽屉初始化完成');
        });

        const submitBtn = document.querySelector('#submit-btn');
        const inputField = document.querySelector('#knowledge-input');
        const statusArea = document.querySelector('#status-area');
        const statusText = document.querySelector('#status-text');
        const progressBar = document.querySelector('#progress-bar');
        const statusIcon = document.querySelector('#status-icon');

        submitBtn.addEventListener('click', async () => {
            const content = inputField.value.trim();
            if (!content) {
                alert("请输入内容后再播种哦！");
                return;
            }

            submitBtn.disabled = true;
            statusArea.style.display = 'block';
            updateUI("Agent 1 (Ingestion): 正在总结内容...", 33, "data_exploration");

            try {
                const response = await fetch('/api/grow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });

                if (!response.ok) throw new Error("后端响应异常，请检查 API 配置");

                const result = await response.json();

                updateUI("Agent 2 (Synthesis): 发现知识隐藏关联...", 66, "hub");
                await new Promise(r => setTimeout(r, 1000));

                updateUI("Agent 3 (Growth): 催生复习与应用建议...", 90, "trending_up");
                await new Promise(r => setTimeout(r, 800));

                saveToGarden(result.data);
                updateUI("培育完成！正在同步至花园...", 100, "check_circle");

                setTimeout(() => {
                    window.location.href = 'garden.html';
                }, 1000);
            } catch (error) {
                console.error(error);
                updateUI("出错了: " + error.message, 0, "error");
                submitBtn.disabled = false;
            }
        });

        function updateUI(text, progress, icon) {
            statusText.innerText = text;
            progressBar.value = progress;
            if (statusIcon) statusIcon.name = icon;
        }

        function saveToGarden(data) {
            const garden = JSON.parse(localStorage.getItem('garden_history') || '[]');
            garden.unshift({
                ...data,
                id: Date.now(),
                created_at: new Date().toLocaleString()
            });
            localStorage.setItem('garden_history', JSON.stringify(garden));
        }
    </script>

</body>
</html>
