<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | My Plants</title>

    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  
    mermaid.initialize({ 
      startOnLoad: false, 
      theme: 'base',
      themeVariables: {
        background: 'transparent',
      fontFamily: 'Roboto, system-ui, sans-serif',
      fontSize: '16px',
      labelFontWeight: '600',
          
      // 1. Main theme
      primaryColor: '#845EC2',
      primaryTextColor: '#ffffff',
      lineColor: '#B39CD0',
      
      // 2. Branch node color
      cScale0: '#845EC2', 
      cScale1: '#B39CD0', 
      cScale2: '#00C9A7', 
      cScale3: '#CAA3CF', 
      cScale4: '#B39CD0', 
      cScale5: '#845EC2',
      cScale6: '#CAA3CF',
      cScale7: '#00C9A7',
      
      // 3. Branch text color
      cScaleLabelColor0: '#ffffff',
      cScaleLabelColor1: '#ffffff',
      cScaleLabelColor2: '#ffffff',
      cScaleLabelColor3: '#21005d', 
      cScaleLabelColor4: '#ffffff',

      // 4. node style
      rectRadius: 12,
      mainBkg: '#845EC2',
      nodeBkg: '#B39CD0',
      nodeTextColor: '#ffffff',
      titleColor: '#845EC2'
      }
    });
    window.mermaid = mermaid;
  </script>

    <script src="/js/lang.js"></script>

    <style>
        :root {
            --max-width: 1200px;
        }

        body {
            background-color: var(--mdui-color-surface-container-lowest);
            color: var(--mdui-color-on-surface);
            padding-bottom: 50px;
            margin: 0;
        }

        .garden-header {
            text-align: center;
            margin: 60px 0 40px;
            padding: 0 20px;
        }

        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
        }

        mdui-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        mdui-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--mdui-elevation-level3);
        }

        mdui-card[selected] {
            outline: 3px solid var(--mdui-color-primary);
            box-shadow: var(--mdui-elevation-level4);
        }

        .card-checkbox {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            padding-right: 44px; /* 避开复选框 */
        }

        /* 标题容器与编辑逻辑 */
        .title-container {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-grow: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.4;
            word-break: break-word;
            flex-grow: 1;
            padding: 2px 4px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .card-title[contenteditable="true"] {
            background-color: var(--mdui-color-surface-container-highest);
            outline: 2px solid var(--mdui-color-primary);
            cursor: text;
        }

        .edit-icon-btn {
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .edit-icon-btn:hover {
            opacity: 1;
        }

        .card-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .card-date {
            font-size: 11px;
            opacity: 0.6;
            white-space: nowrap;
        }

        .model-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background-color: var(--mdui-color-surface-container-highest);
            color: var(--mdui-color-primary);
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Agent 2 滚动容器修正 */
        .tags-scroll-container {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            gap: 8px;
            padding-bottom: 8px; /* 留出滚动条空间 */
            scrollbar-width: thin;
            scrollbar-color: var(--mdui-color-outline) transparent;
        }

        .tags-scroll-container::-webkit-scrollbar {
            height: 4px;
        }

        .tags-scroll-container::-webkit-scrollbar-thumb {
            background: var(--mdui-color-outline);
            border-radius: 10px;
        }

        .tag-chip {
            flex-shrink: 0; /* 必须禁止缩放才能滚动 */
        }

        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--mdui-color-primary);
            font-weight: bold;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 0.4px;
        }

        .markdown-body {
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .markdown-body p {
            margin: 4px 0 12px;
        }

        .growth-box {
            background-color: var(--mdui-color-secondary-container);
            color: var(--mdui-color-on-secondary-container);
            padding: 12px;
            border-radius: 12px;
            margin-top: 8px;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 8px 16px 16px;
            margin-top: auto;
        }

        .fab-combine {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: none;
            z-index: 100;
            align-items: center;
            gap: 10px;
        }

        footer {
            padding: 40px 24px;
            text-align: center;
            background-color: var(--mdui-color-surface-container-low);
            margin-top: 80px;
        }

        .admin-tools {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            margin-top: 100px;
            display: none;
            padding: 0 20px;
        }

        .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
        }

        .rotating {
            animation: mdui-rotate 0.8s linear;
        }

        @keyframes mdui-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .debug-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--mdui-color-outline-variant);
        }
        .debug-label {
            font-weight: bold;
            color: var(--mdui-color-primary);
        }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar scroll-behavior="elevate">
            <mdui-button-icon icon="menu" id="drawer-trigger"></mdui-button-icon>
            <mdui-top-app-bar-title data-i18n="navGarden">My Garden</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>

            <mdui-dropdown>
                <mdui-button-icon icon="language" slot="trigger"></mdui-button-icon>
                <mdui-menu id="language-menu" selects="single">
                    <mdui-menu-item value="zh-cn">简体中文</mdui-menu-item>
                    <mdui-menu-item value="zh-tw">繁體中文</mdui-menu-item>
                    <mdui-menu-item value="en">English</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>

            <mdui-button-icon icon="refresh" id="refresh-btn"></mdui-button-icon>
        </mdui-top-app-bar>

        <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
            <div style="padding: 16px;"><div class="mdui-typo-title" data-i18n="title">Knowledge Garden</div></div>
            <mdui-list>
                <mdui-list-item icon="add_box" href="index.html"><span data-i18n="navSow">Go Sow</span></mdui-list-item>
                <mdui-list-item icon="local_florist" href="garden.html" selected><span data-i18n="navGarden">My Garden</span></mdui-list-item>
            </mdui-list>
        </mdui-navigation-drawer>

        <mdui-layout-main>
            <div class="garden-header">
                <h1 class="mdui-typo-display-medium" data-i18n="navGarden">Knowledge Garden</h1>
                <p style="opacity: 0.7;" data-i18n="subtitle">Cultivating seeds of inspiration</p>
            </div>

            <div class="knowledge-grid" id="garden-container"></div>

            <div id="empty-state" class="empty-state">
                <mdui-icon name="filter_vintage" style="font-size: 80px; opacity: 0.2;"></mdui-icon>
                <p data-i18n="gardenEmpty">Garden is empty.</p>
                <mdui-button variant="tonal" href="index.html"><span data-i18n="navSow">Go Sow</span></mdui-button>
            </div>

            <div class="fab-combine" id="combine-fab">
                <mdui-button variant="filled" icon="auto_fix_high" id="combine-btn">
                    <span id="combine-btn-text" data-i18n="btnCombine">Combine Seeds</span>
                </mdui-button>
                <mdui-button-icon icon="close" onclick="clearSelection()" style="background: var(--mdui-color-surface-container-high);"></mdui-button-icon>
            </div>

            <footer>
                <div class="admin-tools">
                    <mdui-button variant="outlined" icon="file_download" id="export-btn"><span data-i18n="gardenExport">导出备份</span></mdui-button>
                    <mdui-button variant="outlined" icon="file_upload" id="import-btn"><span data-i18n="gardenImport">导入备份</span></mdui-button>
                    <mdui-button variant="outlined" icon="delete_sweep" color="error" id="clear-btn"><span data-i18n="gardenClear">清空花园</span></mdui-button>
                    <input type="file" id="file-input" style="display: none;" accept=".json">
                </div>
                <script async defer src="https://buttons.github.io/buttons.js"></script>
                <div class="mdui-typo-body-medium" style="opacity: 0.6;">
                    <p data-i18n="footerCopy"> © 2026 Knowledge Garden </p>
                    <a class="github-button" href="https://github.com/baipin/knowgarden" data-color-scheme="no-preference: light; light: light; dark: dark;" data-size="large" aria-label="Star baipin/knowgarden on GitHub">Star</a>
                </div>
            </footer>
        </mdui-layout-main>
    </mdui-layout>

    <mdui-dialog id="ppt-dialog" close-on-overlay-click style="--mdui-dialog-width: 800px;">
        <span slot="headline" data-i18n="pptHeadline">Presentation Outline</span>
        <div id="ppt-content" style="white-space: pre-wrap; font-family: monospace; background: var(--mdui-color-surface-container-lowest); padding: 20px; border-radius: 8px; max-height: 500px; overflow-y: auto; border: 1px solid var(--mdui-color-outline-variant);"></div>
        <mdui-button slot="action" variant="text" id="copy-marp-btn" data-i18n="copyMarp">Copy</mdui-button>
        <mdui-button slot="action" variant="tonal" onclick="document.getElementById('ppt-dialog').open = false">Close</mdui-button>
    </mdui-dialog>

    <mdui-dialog id="debug-dialog" close-on-overlay-click>
        <span slot="headline" data-i18n="debugHeadline">Generation Metadata</span>
        <div id="debug-content" style="padding: 0 8px;"></div>
        <mdui-button slot="action" variant="tonal" onclick="document.getElementById('debug-dialog').open = false">Close</mdui-button>
    </mdui-dialog>

    <script>
        const container = document.querySelector('#garden-container');
        const emptyState = document.querySelector('#empty-state');
        const refreshBtn = document.querySelector('#refresh-btn');
        const langMenu = document.querySelector('#language-menu');
        const drawer = document.querySelector('#main-drawer');
        const drawerTrigger = document.querySelector('#drawer-trigger');
        const exportBtn = document.querySelector('#export-btn');
        const importBtn = document.querySelector('#import-btn');
        const clearBtn = document.querySelector('#clear-btn');
        const fileInput = document.querySelector('#file-input');
        const combineFab = document.querySelector('#combine-fab');
        const combineBtn = document.querySelector('#combine-btn');

        let selectedIds = new Set();

        function getCurrentLang() { return localStorage.getItem('user_lang') || 'zh-cn'; }
        function getLangPack() {
            const lang = getCurrentLang();
            return (typeof i18n !== 'undefined' && i18n[lang]) ? i18n[lang] : (i18n['zh-cn'] || {});
        }
        function t(key, fallback = '') {
            const pack = getLangPack();
            return pack[key] || fallback || key;
        }

        function renderContent(text) { 
         if (!text) return '';
         let html = marked.parse(text);
         return `<div class="markdown-body">${html.replace(/<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g, (match, code) => {
            const decodedCode = code.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
            return `<div class="mermaid">${decodedCode}</div>`;
         })}</div>`;
        }
        function escapeHtml(v) { return String(v ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": "&#39;" }[m])); }
        
        function formatTags(tags) {
          if (!tags) return '';
          const trimmed = tags.trim();
          if (trimmed.startsWith('```mermaid') || trimmed.includes('mindmap') || trimmed.includes('graph TD')) {
          return renderContent(tags);
          }
         return tags.split(/,|，/).map(t => t.trim()).filter(t => t).map(t => 
         `<div class="tag-chip">${escapeHtml(t)}</div>`
         ).join('');
       }

        function readGardenData() {
            try { return JSON.parse(localStorage.getItem('garden_history') || '[]').sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)); } catch (e) { return []; }
        }

        function loadGarden() {
            container.innerHTML = '';
            const localData = readGardenData();
            if (localData.length === 0) { emptyState.style.display = 'block'; }
            else { emptyState.style.display = 'none'; renderCards(localData); }
            updateFab();
            return localData;
        }

        function renderCards(dataList) {
            const langPack = getLangPack();
            const a1T = (langPack.agent1 || 'Summary').split(':')[0];
            const a2T = (langPack.agent2 || 'Connections').split(':')[0];
            const a3T = (langPack.agent3 || 'Growth').split(':')[0];

            dataList.forEach(item => {
                const card = document.createElement('mdui-card');
                card.variant = 'elevated';
                card.style.width = '100%';
                const id = String(item.id);
                if (selectedIds.has(id)) card.setAttribute('selected', '');

                card.innerHTML = `
                        <mdui-checkbox class="card-checkbox" ${selectedIds.has(id) ? 'checked' : ''} onchange="manualToggleSelect('${id}', this)"></mdui-checkbox>
                        <div style="padding: 20px;">
                            <div class="card-header-row">
                                <div class="title-container">
                                    <div id="title-${id}" class="card-title" contenteditable="false" 
                                         onblur="saveTitle('${id}')" 
                                         onkeydown="handleTitleKey(event, '${id}')">🌱 ${escapeHtml(item.title || t('gardenUntitled'))}</div>
                                    <mdui-button-icon icon="edit" class="edit-icon-btn" onclick="enableEdit('${id}')"></mdui-button-icon>
                                </div>
                                <div class="card-meta">
                                    <div class="model-tag">${escapeHtml(item.model_used || 'AI')}</div>
                                    <div class="card-date">${escapeHtml(item.created_at || '')}</div>
                                </div>
                            </div>
                            <span class="section-label">${escapeHtml(a1T)}</span>
                            <div class="content-text">${renderContent(item.summary)}</div>
                            <mdui-divider style="margin: 16px 0;"></mdui-divider>
                            <span class="section-label">${escapeHtml(a2T)}</span>
                            <div style="margin-bottom: 16px;">${formatTags(item.connections)}</div>
                            <div class="growth-box">
                                <span class="section-label" style="color: inherit;">${escapeHtml(a3T)}</span>
                                <div class="content-text" style="margin: 0;">${renderContent(item.growth_plan)}</div>
                            </div>
                        </div>
                        <div class="card-actions">
                            <mdui-button-icon icon="bug_report" onclick="showDebugInfo('${id}')" title="Debug Info"></mdui-button-icon>
                            <mdui-button-icon icon="present_to_all" onclick="generatePPT('${id}')" title="${t('btnGeneratePPT')}"></mdui-button-icon>
                            <mdui-button-icon icon="content_copy" onclick="copyCard('${id}')" title="${t('btnCopy')}"></mdui-button-icon>
                            <mdui-button-icon icon="delete_outline" color="error" onclick="deleteCard('${id}')" title="${t('btnDelete')}"></mdui-button-icon>
                        </div>
                    `;
                container.appendChild(card);
            });
            if (window.renderMathInElement) renderMathInElement(container, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }] });
            if (window.mermaid) {
             mermaid.run({
             nodes: container.querySelectorAll('.mermaid')
             }).catch(err => console.error('Mermaid Error:', err));
            }
        }

        // --- 标题修改逻辑 ---
        function enableEdit(id) {
            const el = document.getElementById(`title-${id}`);
            el.contentEditable = "true";
            el.focus();
            // 光标移至末尾
            const range = document.createRange();
            range.selectNodeContents(el);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }

        function handleTitleKey(e, id) {
            if (e.key === 'Enter') {
                e.preventDefault();
                e.target.blur();
            }
        }

        function saveTitle(id) {
            const el = document.getElementById(`title-${id}`);
            el.contentEditable = "false";
            // 去除Emoji前缀进行保存
            let newTitle = el.innerText.replace(/^🌱\s*/, '').trim();
            if (!newTitle) newTitle = t('gardenUntitled');
            
            el.innerText = `🌱 ${newTitle}`; // 格式化显示

            const history = readGardenData();
            const index = history.findIndex(i => String(i.id) === String(id));
            if (index !== -1 && history[index].title !== newTitle) {
                history[index].title = newTitle;
                localStorage.setItem('garden_history', JSON.stringify(history));
                showMessage("Title updated");
            }
        }

        // --- Interaction Logic ---
        function manualToggleSelect(id, checkbox) {
            const card = checkbox.closest('mdui-card');
            if (checkbox.checked) {
                selectedIds.add(id);
                card.setAttribute('selected', '');
            } else {
                selectedIds.delete(id);
                card.removeAttribute('selected');
            }
            updateFab();
        }

        function updateFab() {
            const count = selectedIds.size;
            if (count >= 2) {
                const label = (t('btnCombine') || "Combine {count} Seeds").replace("{count}", count);
                document.getElementById('combine-btn-text').textContent = label;
                combineFab.style.display = 'flex';
            } else { combineFab.style.display = 'none'; }
        }

        function clearSelection() { selectedIds.clear(); loadGarden(); }

        // --- 全量保留的原始业务逻辑 ---
        combineBtn.onclick = async () => {
            const history = readGardenData();
            const selected = history.filter(h => selectedIds.has(String(h.id)));
            const combinedContent = selected.map(s => `### ${s.title}\n${s.summary}\n${s.growth_plan}`).join('\n\n---\n\n');
            showMessage(t('combineLoading'));
            try {
                const response = await fetch('/api/grow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `Synthesis request:\n\n${combinedContent}`, lang: getCurrentLang(), model: selected[0].model_used || "deepseek-chat" })
                });
                const res = await response.json();
                if (res.success) {
                    const newSeed = { ...res.data, id: Date.now(), created_at: new Date().toLocaleString() };
                    localStorage.setItem('garden_history', JSON.stringify([newSeed, ...history]));
                    clearSelection();
                    showMessage(t('combineSuccess'));
                }
            } catch (err) { showMessage("Error during combination"); }
        };

        async function generatePPT(id) {
            const item = readGardenData().find(i => String(i.id) === String(id));
            if (!item) return;
            showMessage(t('combineLoading'));
            try {
                const response = await fetch('/api/generate_ppt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...item, lang: getCurrentLang(), model: item.model_used || "deepseek-chat" })
                });
                const res = await response.json();
                if (res.success) {
                    document.getElementById('ppt-content').textContent = res.data.ppt_markdown;
                    document.getElementById('ppt-dialog').open = true;
                }
            } catch (e) { showMessage("PPT generation failed"); }
        }

        function showDebugInfo(id) {
            const item = readGardenData().find(i => String(i.id) === String(id));
            if (!item) return;
            const content = document.getElementById('debug-content');
            const latency = item.latency ? `${item.latency}ms` : 'N/A';
            const evalMatrix = item.evaluation ? JSON.stringify(item.evaluation, null, 2) : 'No evaluation data';
            const tokens = item.usage ? (item.usage.total_tokens || 'N/A') : 'N/A';
            content.innerHTML = `
                <div class="debug-item"><span class="debug-label">Response Latency</span><span>${latency}</span></div>
                <div class="debug-item"><span class="debug-label">Token Usage</span><span>${tokens}</span></div>
                <div style="margin-top: 16px;"><span class="debug-label">Evaluation Matrix</span><pre style="background: var(--mdui-color-surface-container-high); padding: 12px; border-radius: 8px; font-size: 12px; overflow-x: auto; margin-top: 8px;">${evalMatrix}</pre></div>
            `;
            document.getElementById('debug-dialog').open = true;
        }

        function deleteCard(id) {
            if (!confirm(t('confirmDelete'))) return;
            localStorage.setItem('garden_history', JSON.stringify(readGardenData().filter(i => String(i.id) !== String(id))));
            loadGarden();
        }

        async function copyCard(id) {
            const item = readGardenData().find(i => String(i.id) === String(id));
            const text = `【${item.title}】\n\n${item.summary}\n\nPlan: ${item.growth_plan}`;
            await navigator.clipboard.writeText(text);
            showMessage(t('copySuccess'));
        }

        document.getElementById('copy-marp-btn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('ppt-content').textContent);
            showMessage(t('copySuccess'));
        };

        function showMessage(m) { if (window.mdui) mdui.snackbar({ message: m }); }

        function applyLanguage(lang) {
            if (typeof i18n === 'undefined') return;
            const data = i18n[lang] || i18n['zh-cn'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.textContent = data[key];
            });
            localStorage.setItem('user_lang', lang);
            langMenu.value = lang;
            loadGarden();
        }

        drawerTrigger.onclick = () => drawer.open = !drawer.open;
        langMenu.onchange = () => applyLanguage(langMenu.value);
        refreshBtn.onclick = () => { refreshBtn.classList.add('rotating'); loadGarden(); setTimeout(() => refreshBtn.classList.remove('rotating'), 800); };
        exportBtn.onclick = () => {
            const blob = new Blob([localStorage.getItem('garden_history')], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `garden_backup_${Date.now()}.json`; a.click();
        };
        importBtn.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const imported = JSON.parse(ev.target.result);
                const unique = Array.from(new Map([...imported, ...readGardenData()].map(i => [i.id || i.created_at, i])).values());
                localStorage.setItem('garden_history', JSON.stringify(unique));
                loadGarden();
            };
            reader.readAsText(e.target.files[0]);
        };
        clearBtn.onclick = () => { if (confirm(t('gardenClearConfirm'))) { localStorage.removeItem('garden_history'); loadGarden(); } };

        window.onload = () => applyLanguage(getCurrentLang());
    </script>
</body>
</html>
