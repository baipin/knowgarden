<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | Capture</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <style>
        :root { --max-width: 800px; }
        body { 
            background-color: var(--mdui-color-surface); 
            color: var(--mdui-color-on-surface);
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .main-container {
            max-width: var(--max-width);
            margin: 40px auto;
            padding: 0 24px;
            min-height: calc(100vh - 300px);
        }
        .input-card {
            padding: 40px;
            border-radius: 28px;
            background-color: var(--mdui-color-surface-container-high);
            box-shadow: var(--mdui-elevation-level1);
        }
        #status-area {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            background-color: var(--mdui-color-secondary-container);
            display: none;
        }
        footer {
            padding: 32px 24px;
            text-align: center;
            margin-top: 60px;
            opacity: 0.6;
        }
        mdui-menu-item { cursor: pointer; }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar variant="flat">
            <mdui-button-icon icon="menu" id="drawer-trigger"></mdui-button-icon>
            <mdui-top-app-bar-title data-i18n="title">Knowledge Garden</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>
            
            <mdui-dropdown id="language-dropdown">
                <mdui-button-icon icon="language" slot="trigger"></mdui-button-icon>
                <mdui-menu id="language-menu">
                    <mdui-menu-item value="zh-cn">简体中文</mdui-menu-item>
                    <mdui-menu-item value="zh-tw">繁體中文</mdui-menu-item>
                    <mdui-menu-item value="en">English</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
        </mdui-top-app-bar>

        <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
            <div style="padding: 16px;">
                <span class="mdui-typo-title" data-i18n="title">Knowledge Garden</span>
            </div>
            <mdui-list>
                <mdui-list-item icon="add_box" href="index.html" data-i18n="navSow" selected>播种灵感</mdui-list-item>
                <mdui-list-item icon="local_florist" href="garden.html" data-i18n="navGarden">查看花园</mdui-list-item>
            </mdui-list>
        </mdui-navigation-drawer>

        <mdui-layout-main>
            <div class="main-container">
                <div class="input-card">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <div style="font-size: 56px; margin-bottom: 16px;">🌱</div>
                        <h1 class="mdui-typo-display-small" data-i18n="title">Knowledge Garden</h1>
                        <p style="opacity: 0.7;" data-i18n="subtitle">培育你的灵感种子</p>
                    </div>

                    <mdui-text-field id="knowledge-input"
                                     data-i18n-label="inputLabel"
                                     data-i18n-placeholder="inputPlaceholder"
                                     rows="6"
                                     area
                                     variant="outlined"></mdui-text-field>

                    <div style="display: flex; justify-content: center; margin-top: 32px;">
                        <mdui-button id="submit-btn" icon="auto_awesome" variant="filled">
                            <span data-i18n="btnSubmit">开始培育 (Sow Seeds)</span>
                        </mdui-button>
                    </div>

                    <div id="status-area">
                        <div style="display: flex; align-items: center; margin-bottom: 12px;">
                            <mdui-icon name="hourglass_empty" id="status-icon" style="margin-right: 12px; color: var(--mdui-color-primary);"></mdui-icon>
                            <span id="status-text" style="font-weight: 500;">...</span>
                        </div>
                        <mdui-linear-progress id="progress-bar"></mdui-linear-progress>
                    </div>
                </div>
            </div>

            <footer>
                <div class="mdui-typo-body-medium" data-i18n="footerCopy">© 2026 Knowledge Garden</div>
            </footer>
        </mdui-layout-main>
    </mdui-layout>

    <script>
        // --- 1. 国际化数据包 ---
        const i18n = {
            "zh-cn": {
                "title": "知识花园",
                "subtitle": "培育你的灵感种子",
                "inputLabel": "灵感内容",
                "inputPlaceholder": "写下你的灵感、知识片段或任何想法...",
                "btnSubmit": "开始培育",
                "navSow": "播种灵感",
                "navGarden": "查看花园",
                "footerCopy": "© 2026 知识花园",
                "agent1": "正在分析你的灵感... 🌱",
                "agent2": "连接知识脉络... 🔗",
                "agent3": "即将绽放，正在整理花园 ✨"
            },
            "zh-tw": {
                "title": "知識花園",
                "subtitle": "培育你的靈感種子",
                "inputLabel": "靈感內容",
                "inputPlaceholder": "寫下你的靈感、知識片段或任何想法...",
                "btnSubmit": "開始培育",
                "navSow": "播種靈感",
                "navGarden": "查看花園",
                "footerCopy": "© 2026 知識花園",
                "agent1": "正在分析你的靈感... 🌱",
                "agent2": "連接知識脈絡... 🔗",
                "agent3": "即將綻放，正在整理花園 ✨"
            },
            "en": {
                "title": "Knowledge Garden",
                "subtitle": "Cultivate your inspiration seeds",
                "inputLabel": "Inspiration Content",
                "inputPlaceholder": "Write down your ideas, knowledge snippets, or any thoughts...",
                "btnSubmit": "Sow Seeds",
                "navSow": "Sow Inspiration",
                "navGarden": "View Garden",
                "footerCopy": "© 2026 Knowledge Garden",
                "agent1": "Analyzing your inspiration... 🌱",
                "agent2": "Connecting knowledge paths... 🔗",
                "agent3": "About to bloom, organizing garden ✨"
            }
        };

        let drawerInstance = null;

        // --- 2. 初始化核心 ---
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化 Drawer
            const drawerElement = document.querySelector('#main-drawer');
            if (drawerElement) {
                drawerInstance = new mdui.Drawer(drawerElement);
            }

            // 侧边栏开关
            document.getElementById('drawer-trigger')?.addEventListener('click', () => {
                drawerInstance?.toggle();
            });

            // 初始语言加载
            const savedLang = localStorage.getItem('user_lang') || 'zh-cn';
            applyLanguage(savedLang);

            // 绑定提交按钮
            document.getElementById('submit-btn')?.addEventListener('click', handleSubmit);
        });

        // --- 3. 语言切换增强版 (委托监听) ---
        document.body.addEventListener('click', (e) => {
            const menuItem = e.target.closest('mdui-menu-item');
            if (menuItem && menuItem.closest('#language-menu')) {
                const langVal = menuItem.getAttribute('value');
                if (langVal && i18n[langVal]) {
                    applyLanguage(langVal);
                    // 兼容性关闭下拉框
                    const dropdown = document.getElementById('language-dropdown');
                    if (dropdown) dropdown.open = false;
                }
            }
        });

        function applyLanguage(lang) {
            const data = i18n[lang];
            if (!data) return;

            // 更新静态文案
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.textContent = data[key];
            });

            // 更新输入框 Label & Placeholder (MDUI 2 标准写法)
            const textField = document.getElementById('knowledge-input');
            if (textField) {
                textField.label = data.inputLabel;
                textField.placeholder = data.inputPlaceholder;
            }

            // 更新按钮文案
            const btnSpan = document.querySelector('#submit-btn span');
            if (btnSpan) btnSpan.textContent = data.btnSubmit;

            localStorage.setItem('user_lang', lang);
        }

        // --- 4. 提交处理 ---
        async function handleSubmit() {
            const inputField = document.getElementById('knowledge-input');
            const content = inputField?.value.trim();
            const currentLang = localStorage.getItem('user_lang') || 'zh-cn';
            const langPack = i18n[currentLang];

            if (!content) {
                alert(currentLang === 'en' ? "Please enter something!" : "请输入内容！");
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            const statusArea = document.getElementById('status-area');
            
            submitBtn.disabled = true;
            statusArea.style.display = 'block';
            updateUI(langPack.agent1, 33, "data_exploration");

            try {
                const response = await fetch('/api/grow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, lang: currentLang })
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error || "Backend Error");
                }

                // 进度模拟
                updateUI(langPack.agent2, 66, "hub");
                await new Promise(r => setTimeout(r, 600));
                updateUI(langPack.agent3, 95, "trending_up");
                await new Promise(r => setTimeout(r, 800));

                saveToGarden(result.data);
                window.location.href = 'garden.html';

            } catch (err) {
                console.error("Error:", err);
                alert(`Error: ${err.message}`);
                submitBtn.disabled = false;
                statusArea.style.display = 'none';
            }
        }

        function updateUI(text, progress, icon) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('progress-bar').value = progress;
            document.getElementById('status-icon').name = icon;
        }

        function saveToGarden(data) {
            const history = JSON.parse(localStorage.getItem('garden_history') || '[]');
            history.unshift({
                ...data,
                id: Date.now(),
                created_at: new Date().toLocaleString()
            });
            localStorage.setItem('garden_history', JSON.stringify(history));
        }
    </script>
</body>
</html>
