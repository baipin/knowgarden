<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | Capture</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <style>
        :root { --max-width: 800px; }
        body { 
            background-color: var(--mdui-color-surface); 
            color: var(--mdui-color-on-surface);
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .main-container {
            max-width: var(--max-width);
            margin: 40px auto;
            padding: 0 24px;
            min-height: calc(100vh - 300px);
        }
        .input-card {
            padding: 40px;
            border-radius: 28px;
            background-color: var(--mdui-color-surface-container-high);
            box-shadow: var(--mdui-elevation-level1);
        }
        #status-area {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            background-color: var(--mdui-color-secondary-container);
            display: none;
        }
        footer {
            padding: 32px 24px;
            text-align: center;
            margin-top: 60px;
            opacity: 0.6;
        }
        mdui-menu-item { cursor: pointer; }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar variant="flat">
            <mdui-button-icon icon="menu" id="drawer-trigger"></mdui-button-icon>
            <mdui-top-app-bar-title data-i18n="title">Knowledge Garden</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>
            
            <mdui-dropdown id="language-dropdown">
                <mdui-button-icon icon="language" slot="trigger"></mdui-button-icon>
                <mdui-menu id="language-menu">
                    <mdui-menu-item value="zh-cn">简体中文</mdui-menu-item>
                    <mdui-menu-item value="zh-tw">繁體中文</mdui-menu-item>
                    <mdui-menu-item value="en">English</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
        </mdui-top-app-bar>

        <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
            <div style="padding: 16px;">
                <span class="mdui-typo-title" data-i18n="title">Knowledge Garden</span>
            </div>
            <mdui-list>
                <mdui-list-item icon="add_box" href="index.html" data-i18n="navSow" selected>播种灵感</mdui-list-item>
                <mdui-list-item icon="local_florist" href="garden.html" data-i18n="navGarden">查看花园</mdui-list-item>
            </mdui-list>
        </mdui-navigation-drawer>

        <mdui-layout-main>
            <div class="main-container">
                <div class="input-card">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <div style="font-size: 56px; margin-bottom: 16px;">🌱</div>
                        <h1 class="mdui-typo-display-small" data-i18n="title">Knowledge Garden</h1>
                        <p style="opacity: 0.7;" data-i18n="subtitle">培育你的灵感种子</p>
                    </div>

                    <mdui-text-field id="knowledge-input"
                                     rows="6"
                                     area
                                     variant="outlined"></mdui-text-field>

                    <div style="display: flex; justify-content: center; margin-top: 32px;">
                        <mdui-button id="submit-btn" icon="auto_awesome" variant="filled">
                            <span data-i18n="btnSubmit">开始培育 (Sow Seeds)</span>
                        </mdui-button>
                    </div>

                    <div id="status-area">
                        <div style="display: flex; align-items: center; margin-bottom: 12px;">
                            <mdui-icon name="hourglass_empty" id="status-icon" style="margin-right: 12px; color: var(--mdui-color-primary);"></mdui-icon>
                            <span id="status-text" style="font-weight: 500;">...</span>
                        </div>
                        <mdui-linear-progress id="progress-bar"></mdui-linear-progress>
                    </div>
                </div>
            </div>

            <footer>
                <div class="mdui-typo-body-medium" data-i18n="footerCopy">© 2026 Knowledge Garden</div>
            </footer>
        </mdui-layout-main>
    </mdui-layout>

    <script>
        // --- 1. 语言包与 Agent 阶段描述 ---
        const i18n = {
            "zh-cn": {
                "title": "知识花园",
                "subtitle": "Agent 自动摄取与总结灵感",
                "inputLabel": "今日灵感内容 (支持链接)",
                "inputPlaceholder": "输入文本或粘贴链接，由 api/ 下的 Agent 自动处理...",
                "btnSubmit": "启动 Agent 培育",
                "navSow": "播种灵感",
                "navGarden": "查看花园",
                "footerCopy": "© 2026 知识花园",
                "agent1": "Ingestion Agent: 正在抓取内容... 🌱",
                "agent2": "Association Agent: 正在 api/ 库中检索关联... 🔗",
                "agent3": "Synthesis Agent: 正在由 main.py 最终生成方案... ✨",
                "emptyAlert": "内容不能为空！"
            },
            "en": {
                "title": "Knowledge Garden",
                "subtitle": "Automated Ingestion & Synthesis",
                "inputLabel": "Inspiration Port",
                "inputPlaceholder": "Enter content to be processed by /api Agents...",
                "btnSubmit": "Start Agent Process",
                "navSow": "Sow Seeds",
                "navGarden": "My Garden",
                "footerCopy": "© 2026 Knowledge Garden",
                "agent1": "Ingestion Agent: Extracting... 🌱",
                "agent2": "Association Agent: Linking nodes... 🔗",
                "agent3": "Synthesis Agent: Finalizing in main.py... ✨",
                "emptyAlert": "Please enter something!"
            }
        };

        // --- 2. 状态应用与语言切换 ---
        function applyLanguage(lang) {
            const data = i18n[lang] || i18n['en'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.textContent = data[key];
            });
            const input = document.getElementById('knowledge-input');
            if (input) {
                input.label = data.inputLabel;
                input.placeholder = data.inputPlaceholder;
            }
            localStorage.setItem('user_lang', lang);
        }

        // --- 3. 核心功能与缓存逻辑 ---
        document.addEventListener('DOMContentLoaded', () => {
            const drawer = new mdui.Drawer(document.getElementById('main-drawer'));
            document.getElementById('drawer-trigger').onclick = () => drawer.toggle();

            const savedLang = localStorage.getItem('user_lang') || 'zh-cn';
            applyLanguage(savedLang);

            // 语言菜单逻辑
            document.querySelectorAll('#language-menu mdui-menu-item').forEach(item => {
                item.onclick = () => {
                    const lang = item.getAttribute('value');
                    applyLanguage(lang);
                    document.getElementById('language-dropdown').open = false;
                };
            });

            // 提交按钮逻辑
            const submitBtn = document.getElementById('submit-btn');
            const inputField = document.getElementById('knowledge-input');
            const statusArea = document.getElementById('status-area');
            const statusText = document.getElementById('status-text');
            const progressBar = document.getElementById('progress-bar');
            const statusIcon = document.getElementById('status-icon');

            submitBtn.onclick = async () => {
                const content = inputField.value.trim();
                const currentLang = localStorage.getItem('user_lang') || 'zh-cn';
                const langPack = i18n[currentLang];

                if (!content) {
                    alert(langPack.emptyAlert);
                    return;
                }

                // UI 表现
                submitBtn.disabled = true;
                statusArea.style.display = 'block';
                
                // Agent 1: 摄取
                statusText.innerText = langPack.agent1;
                progressBar.value = 33;
                statusIcon.name = "data_exploration";

                try {
                    // 调用 main.py 转发到 api/agent 逻辑
                    const response = await fetch('/api/grow', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content, lang: currentLang })
                    });
                    
                    const result = await response.json();
                    if (!result.success) throw new Error(result.error);

                    // Agent 2: 关联模拟
                    await new Promise(r => setTimeout(r, 600));
                    statusText.innerText = langPack.agent2;
                    progressBar.value = 66;
                    statusIcon.name = "hub";

                    // Agent 3: 综合模拟
                    await new Promise(r => setTimeout(r, 800));
                    statusText.innerText = langPack.agent3;
                    progressBar.value = 95;
                    statusIcon.name = "trending_up";

                    // --- 关键：保存历史数据到浏览器缓存 (localStorage) ---
                    const history = JSON.parse(localStorage.getItem('garden_history') || '[]');
                    const newRecord = {
                        ...result.data, // 包含后端 Agent 返回的 summary, tags 等
                        id: Date.now(),
                        created_at: new Date().toLocaleString(),
                        raw_content: content
                    };
                    history.unshift(newRecord); // 最新数据放在最前面
                    localStorage.setItem('garden_history', JSON.stringify(history));

                    // 跳转到花园页面展示历史数据
                    setTimeout(() => {
                        window.location.href = 'garden.html';
                    }, 500);

                } catch (err) {
                    console.error("Agent Error:", err);
                    alert("处理失败，请检查 main.py 是否启动");
                    submitBtn.disabled = false;
                    statusArea.style.display = 'none';
                }
            };
        });
    </script>
</body>
</html>
