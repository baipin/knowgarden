<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | Capture</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <script src="./js/lang.js"></script>
    <style>
        :root {
            --max-width: 800px;
        }

        body {
            background-color: var(--mdui-color-surface);
            color: var(--mdui-color-on-surface);
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .main-container {
            max-width: var(--max-width);
            margin: 40px auto;
            padding: 0 24px;
            min-height: calc(100vh - 300px);
        }

        .input-card {
            padding: 40px;
            border-radius: 28px;
            background-color: var(--mdui-color-surface-container-high);
            box-shadow: var(--mdui-elevation-level1);
        }
        /* 新增：配置栏样式 */
        .config-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        #status-area {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            background-color: var(--mdui-color-secondary-container);
            display: none;
        }

        footer {
            padding: 32px 24px;
            text-align: center;
            margin-top: 60px;
            opacity: 0.6;
        }

        .error-message {
            white-space: pre-wrap;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .error-raw {
            background: var(--mdui-color-surface-container);
            border-radius: 12px;
            padding: 16px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 320px;
            overflow: auto;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid var(--mdui-color-outline-variant);
        }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar variant="flat">
            <mdui-button-icon icon="menu" id="drawer-trigger"></mdui-button-icon>
            <mdui-top-app-bar-title data-i18n="title">Knowledge Garden</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>

            <mdui-dropdown>
                <mdui-button-icon icon="language" slot="trigger"></mdui-button-icon>
                <mdui-menu id="language-menu" selects="single">
                    <mdui-menu-item value="zh-cn">简体中文</mdui-menu-item>
                    <mdui-menu-item value="zh-tw">繁體中文</mdui-menu-item>
                    <mdui-menu-item value="en">English</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
        </mdui-top-app-bar>

        <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
            <div style="padding: 16px;">
                <span class="mdui-typo-title" data-i18n="title">Knowledge Garden</span>
            </div>
            <mdui-list>
                <mdui-list-item icon="add_box" href="index.html" data-i18n="navSow" selected>播种灵感</mdui-list-item>
                <mdui-list-item icon="local_florist" href="garden.html" data-i18n="navGarden">查看花园</mdui-list-item>
            </mdui-list>
        </mdui-navigation-drawer>

        <mdui-layout-main>
            <div class="main-container">
                <div class="input-card">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <div style="font-size: 56px; margin-bottom: 16px;">🌱</div>
                        <h1 class="mdui-typo-display-small" data-i18n="title">Knowledge Garden</h1>
                        <p style="opacity: 0.7;" data-i18n="subtitle">培育你的灵感种子</p>
                    </div>

                    <div class="config-bar">
                        <mdui-select id="model-select" value="GPT-4o-mini" label="AI Model" variant="outlined" style="width: 200px;">
                            <mdui-menu-item value="gpt-4o-mini">GPT-4o-mini</mdui-menu-item>
                            <mdui-menu-item value="gpt-3.5-turbo">GPT-3.5-Turbo</mdui-menu-item>
                            <mdui-menu-item value="gpt-4.1-mini">GPT-4.1-mini</mdui-menu-item>
                            <mdui-menu-item value="gpt-4.1-nano">GPT-4.1-nano</mdui-menu-item>
                            <mdui-menu-item value="gpt-5-mini">GPT-5-mini</mdui-menu-item>
                            <mdui-menu-item value="gpt-5-nano">GPT-5-nano</mdui-menu-item>
                            <mdui-menu-item value="gpt-5">GPT-5</mdui-menu-item>
                            <mdui-menu-item value="deepseek-r1">Deepseek-r1</mdui-menu-item>
                            <mdui-menu-item value="deepseek-v3">Deepseek-v3</mdui-menu-item>
                        </mdui-select>
                    </div>

                    <mdui-text-field id="knowledge-input"
                                     data-i18n-label="inputLabel"
                                     data-i18n-placeholder="inputPlaceholder"
                                     rows="6"
                                     area
                                     variant="outlined"></mdui-text-field>

                    <div style="display: flex; justify-content: center; margin-top: 32px;">
                        <mdui-button id="submit-btn" icon="auto_awesome" variant="filled">
                            <span data-i18n="btnSubmit">开始培育 (Sow Seeds)</span>
                        </mdui-button>
                    </div>

                    <div id="status-area">
                        <div style="display: flex; align-items: center; margin-bottom: 12px;">
                            <mdui-icon name="hourglass_empty" id="status-icon" style="margin-right: 12px; color: var(--mdui-color-primary);"></mdui-icon>
                            <span id="status-text" style="font-weight: 500;">...</span>
                        </div>
                        <mdui-linear-progress id="progress-bar"></mdui-linear-progress>
                    </div>
                </div>
            </div>

            <footer>
                <div class="mdui-typo-body-medium" data-i18n="footerCopy">© 2026 Knowledge Garden</div>
            </footer>
        </mdui-layout-main>
    </mdui-layout>

    <mdui-dialog id="error-dialog" close-on-overlay-click>
        <div slot="headline" id="error-dialog-title">Error</div>
        <div slot="description">
            <div id="error-dialog-message" class="error-message"></div>
            <pre id="error-dialog-raw" class="error-raw"></pre>
        </div>
        <mdui-button slot="action" variant="text" id="error-dialog-close">OK</mdui-button>
    </mdui-dialog>

    <script>
        const drawer = document.getElementById('main-drawer');
        const trigger = document.getElementById('drawer-trigger');
        const langMenu = document.getElementById('language-menu');
        const modelSelect = document.getElementById('model-select'); // 获取模型选择器
        const submitBtn = document.getElementById('submit-btn');
        const inputField = document.getElementById('knowledge-input');
        const statusArea = document.getElementById('status-area');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const statusIcon = document.getElementById('status-icon');

        const errorDialog = document.getElementById('error-dialog');
        const errorDialogTitle = document.getElementById('error-dialog-title');
        const errorDialogMessage = document.getElementById('error-dialog-message');
        const errorDialogRaw = document.getElementById('error-dialog-raw');
        const errorDialogClose = document.getElementById('error-dialog-close');

        function getCurrentLang() {
            return localStorage.getItem('user_lang') || 'zh-cn';
        }

        function getLangPack() {
            const lang = getCurrentLang();
            return i18n[lang] || i18n['zh-cn'];
        }

        function applyLanguage(lang) {
            if (typeof i18n === 'undefined') {
                console.warn("lang.js 尚未加载或 i18n 未定义");
                return;
            }

            const data = i18n[lang];
            if (!data) return;

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.textContent = data[key];
            });

            document.querySelectorAll('[data-i18n-label]').forEach(el => {
                const key = el.getAttribute('data-i18n-label');
                if (data[key]) el.label = data[key];
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (data[key]) el.placeholder = data[key];
            });

            langMenu.value = lang;
            localStorage.setItem('user_lang', lang);
        }

        function updateUI(text, progress, icon) {
            statusText.innerText = text;
            progressBar.value = progress;
            if (statusIcon) statusIcon.name = icon;
        }

        function resetUI() {
            submitBtn.disabled = false;
            statusArea.style.display = 'none';
        }

        function saveToGarden(data, modelUsed) {
            const garden = JSON.parse(localStorage.getItem('garden_history') || '[]');
            garden.unshift({
                ...data,
                model_used: modelUsed, // 记录使用的模型
                id: Date.now(),
                created_at: new Date().toLocaleString()
            });
            localStorage.setItem('garden_history', JSON.stringify(garden));
        }

        function showErrorDialog(title, message, rawError = '') {
            errorDialogTitle.textContent = title || 'Error';
            errorDialogMessage.textContent = message || '';
            errorDialogRaw.textContent = rawError || 'No raw error details.';
            errorDialog.open = true;
        }

        async function parseApiResponse(response) {
            const rawText = await response.text();

            let result = null;
            try {
                result = JSON.parse(rawText);
            } catch (parseErr) {
                throw new Error(
                    `Server did not return valid JSON.\n` +
                    `HTTP ${response.status} ${response.statusText}\n\n` +
                    `===== Raw Response =====\n${rawText}`
                );
            }

            return { result, rawText };
        }

        langMenu.addEventListener('change', () => {
            applyLanguage(langMenu.value);
        });

        trigger.addEventListener('click', () => {
            drawer.open = !drawer.open;
        });

        errorDialogClose.addEventListener('click', () => {
            errorDialog.open = false;
        });

        submitBtn.addEventListener('click', async () => {
            const content = inputField.value.trim();
            const currentLang = getCurrentLang();
            const selectedModel = modelSelect.value; // 获取模型值
            const langPack = i18n[currentLang] || i18n['zh-cn'];

            if (!content) {
                showErrorDialog(
                    langPack.backendErrorTitle || '提示',
                    langPack.emptyInput || '请输入内容后再播种哦！',
                    ''
                );
                return;
            }

            submitBtn.disabled = true;
            statusArea.style.display = 'block';
            updateUI(langPack.agent1, 33, "data_exploration");

            try {
                const response = await fetch('/api/grow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // 在请求体中包含了 model 字段
                    body: JSON.stringify({
                        content: content,
                        lang: currentLang,
                        model: selectedModel
                    })
                });

                const { result, rawText } = await parseApiResponse(response);

                if (!response.ok) {
                    const rawError = result?.debug_info || result?.error || rawText || 'Unknown HTTP error.';
                    console.error("HTTP Error:", rawError);

                    showErrorDialog(
                        langPack.backendErrorTitle || '培育失败 (Backend Error)',
                        result?.error || `HTTP ${response.status} ${response.statusText}`,
                        rawError
                    );

                    resetUI();
                    return;
                }

                if (result.success === false) {
                    const rawError = result.debug_info || result.error || 'No raw error details.';
                    console.error("Backend Debug Trace:", rawError);

                    showErrorDialog(
                        langPack.backendErrorTitle || '培育失败 (Backend Error)',
                        result.error || 'Unknown backend error.',
                        rawError
                    );

                    resetUI();
                    return;
                }

                updateUI(langPack.agent2, 66, "hub");
                await new Promise(r => setTimeout(r, 800));
                updateUI(langPack.agent3, 95, "trending_up");
                await new Promise(r => setTimeout(r, 1000));

                saveToGarden(result.data, selectedModel); // 传入选中的模型
                window.location.href = 'garden.html';

            } catch (err) {
                const rawError = err?.stack || err?.message || String(err);
                console.error("Fetch Error:", rawError);

                showErrorDialog(
                    langPack.fetchError || "网络或系统解析错误，请检查后端服务。",
                    "Request failed or server response could not be parsed.",
                    rawError
                );

                resetUI();
            }
        });

        window.addEventListener('load', () => {
            const savedLang = getCurrentLang();
            applyLanguage(savedLang);
        });
    </script>
</body>
</html>
