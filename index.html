<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | Capture</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <style>
        :root {
            --max-width: 800px;
        }

        body {
            background-color: var(--mdui-color-surface);
            color: var(--mdui-color-on-surface);
            font-family: system-ui, -apple-system, sans-serif;
        }

        .main-container {
            max-width: var(--max-width);
            margin: 60px auto;
            padding: 0 24px;
        }

        .input-card {
            padding: 40px;
            border-radius: 28px;
            background-color: var(--mdui-color-surface-container-high);
            box-shadow: var(--mdui-elevation-level1);
        }

        #status-area {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            background-color: var(--mdui-color-secondary-container);
            display: none;
            transition: all 0.3s ease;
        }

        .agent-step {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar variant="flat">
            <mdui-button-icon icon="menu" id="drawer-trigger"></mdui-button-icon>
            <mdui-top-app-bar-title>Knowledge Garden</mdui-top-app-bar-title>
        </mdui-top-app-bar>

        <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
            <div style="padding: 24px 16px;">
                <h2 class="mdui-typo-title">园丁工具箱</h2>
            </div>
            <mdui-list>
                <mdui-list-item icon="add_box" href="index.html" selected>播种灵感</mdui-list-item>
                <mdui-list-item icon="local_florist" href="garden.html">查看花园</mdui-list-item>
                <mdui-divider></mdui-divider>
                <mdui-list-item icon="settings">系统设置</mdui-list-item>
            </mdui-list>
        </mdui-navigation-drawer>

        <mdui-layout-main>
            <div class="main-container">
                <div class="input-card">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <div style="font-size: 56px; margin-bottom: 16px;">🌱</div>
                        <h1 class="mdui-typo-display-small">今天学到了什么？</h1>
                        <p style="opacity: 0.7;">输入想法或链接，AI 园丁将为您自动培育知识</p>
                    </div>

                    <mdui-text-field id="knowledge-input"
                                     label="输入内容..."
                                     placeholder="例如：量子纠缠的非局域性特征..."
                                     rows="6"
                                     area
                                     variant="outlined"></mdui-text-field>

                    <div style="display: flex; justify-content: center; margin-top: 32px;">
                        <mdui-button id="submit-btn" icon="auto_awesome" variant="filled">
                            开始培育 (Sow Seeds)
                        </mdui-button>
                    </div>

                    <div id="status-area">
                        <div class="agent-step">
                            <mdui-icon name="hourglass_empty" id="status-icon" style="margin-right: 12px; color: var(--mdui-color-primary);"></mdui-icon>
                            <span id="status-text">准备启动 Agent 链...</span>
                        </div>
                        <mdui-linear-progress id="progress-bar"></mdui-linear-progress>
                    </div>
                </div>
            </div>
        </mdui-layout-main>
    </mdui-layout>

    <script>
        const drawer = document.querySelector('#main-drawer');
        const trigger = document.querySelector('#drawer-trigger');
        const submitBtn = document.querySelector('#submit-btn');
        const inputField = document.querySelector('#knowledge-input');
        const statusArea = document.querySelector('#status-area');
        const statusText = document.querySelector('#status-text');
        const progressBar = document.querySelector('#progress-bar');
        const statusIcon = document.querySelector('#status-icon');

        // 抽屉开关
        trigger.addEventListener('click', () => drawer.opened = !drawer.opened);

        submitBtn.addEventListener('click', async () => {
            const content = inputField.value.trim();
            if (!content) {
                alert("请输入内容后再播种哦！");
                return;
            }

            // 初始化加载状态
            submitBtn.disabled = true;
            statusArea.style.display = 'block';
            updateUI("Agent 1 (Ingestion): 正在总结内容...", 33, "data_exploration");

            try {
                // 2. 发送请求到 Vercel 后端路径 (api 重命名后的路径)
                const response = await fetch('/api/grow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });

                if (!response.ok) throw new Error("后端响应异常，请检查 API 配置");

                const result = await response.json();

                // 模拟 Agent 2 的处理感
                updateUI("Agent 2 (Synthesis): 发现知识隐藏关联...", 66, "hub");
                await new Promise(r => setTimeout(r, 1000));

                // 模拟 Agent 3 的处理感
                updateUI("Agent 3 (Growth): 催生复习与应用建议...", 90, "trending_up");
                await new Promise(r => setTimeout(r, 800));

                // 存储结果到本地
                saveToGarden(result.data);

                updateUI("培育完成！正在同步至花园...", 100, "check_circle");

                // 延迟跳转，让用户看清完成状态
                setTimeout(() => {
                    window.location.href = 'garden.html';
                }, 1000);

            } catch (error) {
                console.error(error);
                updateUI("出错了: " + error.message, 0, "error");
                submitBtn.disabled = false;
            }
        });

        function updateUI(text, progress, icon) {
            statusText.innerText = text;
            progressBar.value = progress;
            statusIcon.name = icon;
        }

        function saveToGarden(data) {
            const garden = JSON.parse(localStorage.getItem('garden_history') || '[]');
            // 插入到开头
            garden.unshift({
                ...data,
                id: Date.now(),
                created_at: new Date().toLocaleString()
            });
            localStorage.setItem('garden_history', JSON.stringify(garden));
        }
    </script>

</body>
</html>
