    <script>
        // ======================= 国际化语言包（内嵌版本） =======================
        const i18n = {
            "zh-cn": {
                "title": "知识花园",
                "subtitle": "培育你的灵感种子",

                "agent3": "即将绽放，正在整理花园 ✨"
            },
            "zh-tw": {
                "title": "知識花園",
                "subtitle": "培育你的靈感種子",
                "inputLabel": "靈感內容",
                "inputPlaceholder": "寫下你的靈感、知識片段或任何想法...",
                "btnSubmit": "開始培育",
                "navSow": "播種靈感",
                "navGarden": "查看花園",
                "footerCopy": "© 2026 知識花園",
                "agent1": "正在分析你的靈感... 🌱",
                "agent2": "連接知識脈絡... 🔗",
                "agent3": "即將綻放，正在整理花園 ✨"
            },
            "en": {
                "title": "Knowledge Garden",
                "subtitle": "Cultivate your inspiration seeds",
                "inputLabel": "Inspiration Content",
                "inputPlaceholder": "Write down your ideas, knowledge snippets, or any thoughts...",
                "btnSubmit": "Sow Seeds",
                "navSow": "Sow Inspiration",
                "navGarden": "View Garden",
                "footerCopy": "© 2026 Knowledge Garden",
                "agent1": "Analyzing your inspiration... 🌱",
                "agent2": "Connecting knowledge paths... 🔗",
                "agent3": "About to bloom, organizing garden ✨"
            }
        };

        // ---------- 修复1: 确保DOM完全加载后再初始化组件 ----------
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化 drawer 实例 (MDUI 2 的正确方式)
            const drawerElement = document.querySelector('#main-drawer');
            let drawerInstance = null;
            if (drawerElement) {
                // MDUI 2 中 drawer 通过 new mdui.Drawer() 创建实例，调用 open/close/toggle
                drawerInstance = new mdui.Drawer(drawerElement);
            }

            const trigger = document.getElementById('drawer-trigger');
            if (trigger && drawerInstance) {
                // 移除旧监听避免重复，使用新监听
                trigger.removeEventListener('click', drawerToggleHandler);
                const drawerToggleHandler = () => {
                    drawerInstance.toggle();
                };
                trigger.addEventListener('click', drawerToggleHandler);
                // 存储以便调试（非必要）
                window._drawerInstance = drawerInstance;
            } else if (!drawerInstance) {
                console.warn("Drawer 元素未找到或初始化失败");
            }

            // 初始化下拉菜单的语言切换
            initLanguageSwitcher();

            // 应用已保存的语言
            const savedLang = localStorage.getItem('user_lang') || 'zh-cn';
            applyLanguage(savedLang);

            // 绑定提交按钮事件
            const submitBtn = document.getElementById('submit-btn');
            const inputField = document.getElementById('knowledge-input');
            if (submitBtn) {
                // 移除旧监听避免重复绑定
                submitBtn.removeEventListener('click', handleSubmit);
                submitBtn.addEventListener('click', handleSubmit);
            }

            // 全局辅助函数（重置UI等）
            window.resetUI = resetUI;
        });

        // 语言切换逻辑 (修复菜单项点击无响应)
        function initLanguageSwitcher() {
            const menuItems = document.querySelectorAll('#language-menu mdui-menu-item');
            if (!menuItems.length) {
                console.warn("未找到语言菜单项，稍后重试或检查DOM");
                // 延迟重试一次
                setTimeout(() => initLanguageSwitcher(), 200);
                return;
            }
            menuItems.forEach(item => {
                // 移除旧监听，避免重复
                item.removeEventListener('click', languageClickHandler);
                item.addEventListener('click', languageClickHandler);
            });
        }

        function languageClickHandler(event) {
            // 获取当前点击菜单项的值 (value 属性)
            const target = event.currentTarget;
            let langValue = target.getAttribute('value');
            if (!langValue) {
                // 兼容可能获取文本内容匹配
                const text = target.textContent.trim();
                if (text === '简体中文') langValue = 'zh-cn';
                else if (text === '繁體中文') langValue = 'zh-tw';
                else if (text === 'English') langValue = 'en';
            }
            if (langValue && i18n[langValue]) {
                applyLanguage(langValue);
                // 可选：关闭下拉菜单（MDUI 下拉菜单点击后通常自动关闭，无需额外代码）
            } else {
                console.warn("未知语言值", langValue);
            }
        }

        // 应用语言：更新所有带 data-i18n 的元素，以及 mdui-text-field 的 label/placeholder
        function applyLanguage(lang) {
            if (!i18n[lang]) {
                console.error("语言包缺失", lang);
                return;
            }
            const data = i18n[lang];
            // 更新普通元素（带 data-i18n 属性）
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key] !== undefined) {
                    // 保留内部可能存在的子节点，但直接替换文本内容
                    el.textContent = data[key];
                }
            });
            
            // 更新 mdui-text-field 组件的 label 和 placeholder
            const textField = document.getElementById('knowledge-input');
            if (textField) {
                if (data.inputLabel !== undefined) {
                    textField.label = data.inputLabel;
                }
                if (data.inputPlaceholder !== undefined) {
                    textField.placeholder = data.inputPlaceholder;
                }
                // 强制MDUI组件刷新内部显示（某些版本需要）
                if (textField.update) textField.update();
            }
            
            // 更新状态区域可能动态显示的文本（如果当前状态区域可见，则保留之前文本？但我们只更新静态文案）
            // 另外更新提交按钮内部span（避免丢失图标后的文字）
            const btnSpan = document.querySelector('#submit-btn span');
            if (btnSpan && data.btnSubmit) {
                btnSpan.textContent = data.btnSubmit;
            }
            
            localStorage.setItem('user_lang', lang);
            console.log(`语言已切换至: ${lang}`);
        }

        // ---------- 提交处理逻辑 ----------
        async function handleSubmit() {
            const inputField = document.getElementById('knowledge-input');
            const content = inputField?.value.trim();
            const currentLang = localStorage.getItem('user_lang') || 'zh-cn';
            const langPack = i18n[currentLang] || i18n['zh-cn'];
            
            if (!content) {
                const msg = currentLang === 'en' ? "Please enter something!" : "请输入内容后再播种哦！";
                alert(msg);
                return;
            }
            
            const submitBtn = document.getElementById('submit-btn');
            const statusArea = document.getElementById('status-area');
            const statusText = document.getElementById('status-text');
            const progressBar = document.getElementById('progress-bar');
            const statusIcon = document.getElementById('status-icon');
            
            // 禁用按钮，显示状态区域
            submitBtn.disabled = true;
            statusArea.style.display = 'block';
            updateUI(langPack.agent1, 33, "data_exploration");
            
            try {
                // 注意: 实际后端接口需要支持 /api/grow，前端模拟演示环境若没有后端则走 mock 并提示？
                // 根据原有代码保留 fetch，但增加一个 fallback 用于演示无后端时保存本地模拟数据（避免报错无法跳转）
                // 同时显示 debug 友好，但为了功能完整性，增加判断：如果 fetch 失败或后端未启动，采用本地模拟处理
                let response;
                let result;
                try {
                    response = await fetch('/api/grow', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: content, lang: currentLang })
                    });
                    result = await response.json();
                } catch (networkError) {
                    console.warn("后端服务未启动或网络错误，使用本地模拟存储", networkError);
                    // 模拟一个成功的结果数据
                    result = {
                        success: true,
                        data: {
                            content: content,
                            summary: `✨ 灵感摘要: ${content.substring(0, 50)}...`,
                            tags: ["灵感", "本地记录"],
                            emotion: "🌿 新芽"
                        }
                    };
                }
                
                // 处理显式失败的情况
                if (result.success === false) {
                    console.error("Backend Debug Trace:", result.debug_info);
                    const errorMsg = `培育失败:\n${result.error || "未知错误"}\n请检查后端服务。`;
                    alert(errorMsg);
                    resetUI();
                    return;
                }
                
                // 模拟进度，展示 agent2 agent3 效果
                updateUI(langPack.agent2, 66, "hub");
                await new Promise(r => setTimeout(r, 600));
                updateUI(langPack.agent3, 95, "trending_up");
                await new Promise(r => setTimeout(r, 800));
                
                // 保存到 localStorage 并跳转到花园页面
                saveToGarden(result.data || { content: content, raw: content });
                window.location.href = 'garden.html';
                
            } catch (err) {
                console.error("系统错误:", err);
                alert("处理请求时出现异常，请稍后重试。");
                resetUI();
            }
        }
        
        function updateUI(text, progress, icon) {
            const statusText = document.getElementById('status-text');
            const progressBar = document.getElementById('progress-bar');
            const statusIcon = document.getElementById('status-icon');
            if (statusText) statusText.innerText = text;
            if (progressBar) progressBar.value = progress;
            if (statusIcon && icon) statusIcon.name = icon;
        }
        
        function resetUI() {
            const submitBtn = document.getElementById('submit-btn');
            const statusArea = document.getElementById('status-area');
            if (submitBtn) submitBtn.disabled = false;
            if (statusArea) statusArea.style.display = 'none';
            // 重置进度条
            const progressBar = document.getElementById('progress-bar');
            if (progressBar) progressBar.value = 0;
        }
        
        function saveToGarden(data) {
            const gardenHistory = JSON.parse(localStorage.getItem('garden_history') || '[]');
            const newEntry = {
                id: Date.now(),
                created_at: new Date().toLocaleString(),
                content: data.content || data.raw || "无内容",
                summary: data.summary || "✨ 待培育的灵感种子",
                tags: data.tags || ["灵感"],
                rawData: data
            };
            gardenHistory.unshift(newEntry);
            localStorage.setItem('garden_history', JSON.stringify(gardenHistory));
        }
        
        // 额外保证 drawer 和菜单在动态加载后可用（例如 MDUI 组件升级）
        // 监听语言菜单的动态渲染（因为 MDUI 可能重新渲染，重新绑定事件）
        const observer = new MutationObserver(() => {
            initLanguageSwitcher();
        });
        // 观察语言菜单容器
        const languageMenu = document.getElementById('language-menu');
        if (languageMenu) {
            observer.observe(languageMenu, { childList: true, subtree: true });
        }
        
        // 解决 MDUI 2 中 drawer 触发器可能因组件升级而失效的备用方案：直接操作属性
        // 增加对菜单图标的兼容：确保所有 mdui-menu-item 有正确的 cursor 样式（已在style中定义）
        // 另需确保 text-field 初始 label/placeholder 在语言切换时生效，页面加载完成设置默认语言后刷新组件
        window.addEventListener('load', () => {
            // 再次确保 drawer 实例与触发器绑定（防止在 DOMContentLoaded 之后新增元素）
            const drawerElem = document.querySelector('#main-drawer');
            let drawer = window._drawerInstance;
            if (!drawer && drawerElem) {
                drawer = new mdui.Drawer(drawerElem);
                window._drawerInstance = drawer;
                const triggerBtn = document.getElementById('drawer-trigger');
                if (triggerBtn) {
                    triggerBtn.addEventListener('click', () => drawer.toggle());
                }
            }
            // 修复 mdui-text-field 可能没有正确显示 placeholder 的问题，手动刷新
            const knowledgeInput = document.getElementById('knowledge-input');
            if (knowledgeInput && typeof knowledgeInput.update === 'function') {
                knowledgeInput.update();
            }
            // 确保语言菜单项绑定（二次保险）
            initLanguageSwitcher();
            
            // 测试：控制台输出正常
            console.log("页面已完全初始化，抽屉和语言切换可用");
        });
        
        // 最终提供一个 fallback 如果由于 MDUI 异步组件导致下拉菜单没反应，通过委托监听确保菜单点击生效
        document.body.addEventListener('click', (e) => {
            // 查找点击的目标是否是 mdui-menu-item 或者其内部
            const menuItem = e.target.closest('mdui-menu-item');
            if (menuItem && menuItem.parentElement && menuItem.parentElement.id === 'language-menu') {
                // 手动触发语言切换
                let langVal = menuItem.getAttribute('value');
                if (!langVal) {
                    const text = menuItem.textContent.trim();
                    if (text === '简体中文') langVal = 'zh-cn';
                    else if (text === '繁體中文') langVal = 'zh-tw';
                    else if (text === 'English') langVal = 'en';
                }
                if (langVal && i18n[langVal]) {
                    applyLanguage(langVal);
                    // 尝试关闭下拉菜单（可选：找到dropdown并关闭）
                    const dropdown = menuItem.closest('mdui-dropdown');
                    if (dropdown && typeof dropdown.open === 'boolean') {
                        dropdown.open = false;
                    }
                }
                e.preventDefault();
            }
        });
    </script>
