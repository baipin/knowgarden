<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | Capture</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <script src="./js/lang.js"></script>
    <style>
        :root { --max-width: 800px; }
        body { 
            background-color: var(--mdui-color-surface); 
            color: var(--mdui-color-on-surface);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
        }
        .main-container {
            max-width: var(--max-width);
            margin: 40px auto;
            padding: 0 24px;
            min-height: calc(100vh - 250px);
        }
        .input-card {
            padding: 40px;
            border-radius: 28px;
            background-color: var(--mdui-color-surface-container-high);
            box-shadow: var(--mdui-elevation-level1);
        }
        #status-area {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            background-color: var(--mdui-color-secondary-container);
            display: none;
        }
        footer {
            padding: 32px 24px;
            text-align: center;
            background-color: var(--mdui-color-surface-container-lowest);
            border-top: 1px solid var(--mdui-color-outline-variant);
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar variant="flat" scroll-behavior="elevate">
            <mdui-button-icon icon="menu" id="drawer-trigger"></mdui-button-icon>
            <mdui-top-app-bar-title data-i18n="title">Knowledge Garden</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>
            
            <mdui-dropdown id="lang-dropdown">
                <mdui-button-icon icon="language" slot="trigger"></mdui-button-icon>
                <mdui-menu id="language-menu">
                    <mdui-menu-item value="zh-cn">简体中文</mdui-menu-item>
                    <mdui-menu-item value="zh-tw">繁體中文</mdui-menu-item>
                    <mdui-menu-item value="en">English</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
        </mdui-top-app-bar>

        <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
            <div style="padding: 24px 16px;">
                <h2 class="mdui-typo-title" data-i18n="title">Knowledge Garden</h2>
            </div>
            <mdui-list>
                <mdui-list-item icon="add_box" href="index.html" data-i18n="navSow" selected>播种灵感</mdui-list-item>
                <mdui-list-item icon="local_florist" href="garden.html" data-i18n="navGarden">查看花园</mdui-list-item>
                <mdui-divider></mdui-divider>
                <mdui-list-item icon="settings" data-i18n="navSettings">系统设置</mdui-list-item>
            </mdui-list>
        </mdui-navigation-drawer>

        <mdui-layout-main>
            <div class="main-container">
                <div class="input-card">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <div style="font-size: 56px; margin-bottom: 16px;">🌱</div>
                        <h1 class="mdui-typo-display-small" data-i18n="title">Knowledge Garden</h1>
                        <p style="opacity: 0.7;" data-i18n="subtitle">输入想法或链接，AI 园丁将为您自动培育知识</p>
                    </div>

                    <mdui-text-field id="knowledge-input"
                                     data-i18n-label="inputLabel"
                                     data-i18n-placeholder="inputPlaceholder"
                                     rows="6"
                                     area
                                     variant="outlined"></mdui-text-field>

                    <div style="display: flex; justify-content: center; margin-top: 32px;">
                        <mdui-button id="submit-btn" icon="auto_awesome" variant="filled">
                            <span data-i18n="btnSubmit">开始培育 (Sow Seeds)</span>
                        </mdui-button>
                    </div>

                    <div id="status-area">
                        <div class="agent-step" style="display: flex; align-items: center; margin-bottom: 12px;">
                            <mdui-icon name="hourglass_empty" id="status-icon" style="margin-right: 12px; color: var(--mdui-color-primary);"></mdui-icon>
                            <span id="status-text" style="font-weight: 500;">...</span>
                        </div>
                        <mdui-linear-progress id="progress-bar"></mdui-linear-progress>
                    </div>
                </div>
            </div>

            <footer>
                <div class="mdui-typo-body-medium" style="opacity: 0.6;" data-i18n="footerCopy">© 2026 Knowledge Garden</div>
                <div style="margin-top: 12px;">
                    <a href="https://github.com/baipin/knowgarden" target="_blank" style="text-decoration: none;">
                        <mdui-button variant="tonal" icon="code">GitHub</mdui-button>
                    </a>
                </div>
            </footer>
        </mdui-layout-main>
    </mdui-layout>

    <script>
        // 1. 获取所有核心 DOM 元素
        const drawer = document.querySelector('#main-drawer');
        const trigger = document.querySelector('#drawer-trigger');
        const langMenu = document.querySelector('#language-menu');
        const submitBtn = document.querySelector('#submit-btn');
        const inputField = document.querySelector('#knowledge-input');
        const statusArea = document.querySelector('#status-area');
        const statusText = document.querySelector('#status-text');
        const progressBar = document.querySelector('#progress-bar');
        const statusIcon = document.querySelector('#status-icon');

        /**
         * 2. 多语言切换逻辑
         */
        function applyLanguage(lang) {
            if (typeof i18n === 'undefined') {
                console.error("Language file (lang.js) not loaded or i18n object missing.");
                return;
            }
            const data = i18n[lang];
            if (!data) return;

            // 翻译普通文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.textContent = data[key];
            });

            // 翻译 MDUI 组件属性 (Label 和 Placeholder)
            document.querySelectorAll('[data-i18n-label]').forEach(el => {
                const key = el.getAttribute('data-i18n-label');
                if (data[key]) el.label = data[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (data[key]) el.placeholder = data[key];
            });

            localStorage.setItem('user_lang', lang);
        }

        // 初始化语言加载
        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('user_lang') || 'zh-cn';
            applyLanguage(savedLang);
        });

        // 绑定语言切换菜单点击事件
        langMenu.addEventListener('change', (e) => {
            applyLanguage(e.target.value);
        });

        /**
         * 3. 交互逻辑
         */
        // 抽屉开关
        trigger.addEventListener('click', () => {
            drawer.opened = !drawer.opened;
        });

        // 提交按钮逻辑
        submitBtn.addEventListener('click', async () => {
            const content = inputField.value.trim();
            if (!content) {
                alert("Please enter something!");
                return;
            }

            const currentLang = localStorage.getItem('user_lang') || 'zh-cn';
            const langPack = i18n[currentLang];

            // 禁用按钮并显示状态区
            submitBtn.disabled = true;
            statusArea.style.display = 'block';
            
            updateUI(langPack.agent1, 33, "data_exploration");

            try {
                const response = await fetch('/api/grow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content, lang: currentLang })
                });

                if (!response.ok) throw new Error("Server Error");
                const result = await response.json();

                // 模拟 Agent 链的进度展示
                updateUI(langPack.agent2, 66, "hub");
                await new Promise(r => setTimeout(r, 800));
                
                updateUI(langPack.agent3, 95, "trending_up");
                await new Promise(r => setTimeout(r, 800));

                // 保存并跳转
                saveToGarden(result.data);
                window.location.href = 'garden.html';
            } catch (error) {
                console.error(error);
                updateUI("Error: " + error.message, 0, "error");
                submitBtn.disabled = false;
            }
        });

        function updateUI(text, progress, iconName) {
            statusText.innerText = text;
            progressBar.value = progress;
            if (statusIcon) statusIcon.name = iconName;
        }

        function saveToGarden(data) {
            const garden = JSON.parse(localStorage.getItem('garden_history') || '[]');
            garden.unshift({ 
                ...data, 
                id: Date.now(), 
                created_at: new Date().toLocaleString() 
            });
            localStorage.setItem('garden_history', JSON.stringify(garden));
        }
    </script>
</body>
</html>
