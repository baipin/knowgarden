<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Garden | Capture</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <style>
        :root { --max-width: 800px; }
        body { 
            background-color: var(--mdui-color-surface); 
            color: var(--mdui-color-on-surface);
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .main-container {
            max-width: var(--max-width);
            margin: 40px auto;
            padding: 0 24px;
            min-height: calc(100vh - 300px);
        }
        .input-card {
            padding: 40px;
            border-radius: 28px;
            background-color: var(--mdui-color-surface-container-high);
            box-shadow: var(--mdui-elevation-level1);
        }
        #status-area {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            background-color: var(--mdui-color-secondary-container);
            display: none;
        }
        footer {
            padding: 32px 24px;
            text-align: center;
            margin-top: 60px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <mdui-layout>
        <mdui-top-app-bar variant="flat">
            <mdui-button-icon icon="menu" id="drawer-trigger"></mdui-button-icon>
            <mdui-top-app-bar-title data-i18n="title">Knowledge Garden</mdui-top-app-bar-title>
            <div style="flex-grow: 1"></div>
            
            <mdui-dropdown>
                <mdui-button-icon icon="language" slot="trigger"></mdui-button-icon>
                <mdui-menu id="language-menu">
                    <mdui-menu-item value="zh-cn">简体中文</mdui-menu-item>
                    <mdui-menu-item value="zh-tw">繁體中文</mdui-menu-item>
                    <mdui-menu-item value="en">English</mdui-menu-item>
                </mdui-menu>
            </mdui-dropdown>
        </mdui-top-app-bar>

        <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
            <div style="padding: 16px;">
                <span class="mdui-typo-title" data-i18n="title">Knowledge Garden</span>
            </div>
            <mdui-list>
                <mdui-list-item icon="add_box" href="index.html" data-i18n="navSow" selected>播种灵感</mdui-list-item>
                <mdui-list-item icon="local_florist" href="garden.html" data-i18n="navGarden">查看花园</mdui-list-item>
            </mdui-list>
        </mdui-navigation-drawer>

        <mdui-layout-main>
            <div class="main-container">
                <div class="input-card">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <div style="font-size: 56px; margin-bottom: 16px;">🌱</div>
                        <h1 class="mdui-typo-display-small" data-i18n="title">Knowledge Garden</h1>
                        <p style="opacity: 0.7;" data-i18n="subtitle">培育你的灵感种子</p>
                    </div>

                    <mdui-text-field id="knowledge-input"
                                     data-i18n-label="inputLabel"
                                     data-i18n-placeholder="inputPlaceholder"
                                     rows="6"
                                     area
                                     variant="outlined"></mdui-text-field>

                    <div style="display: flex; justify-content: center; margin-top: 32px;">
                        <mdui-button id="submit-btn" icon="auto_awesome" variant="filled">
                            <span data-i18n="btnSubmit">开始培育 (Sow Seeds)</span>
                        </mdui-button>
                    </div>

                    <div id="status-area">
                        <div style="display: flex; align-items: center; margin-bottom: 12px;">
                            <mdui-icon name="hourglass_empty" id="status-icon" style="margin-right: 12px; color: var(--mdui-color-primary);"></mdui-icon>
                            <span id="status-text" style="font-weight: 500;">...</span>
                        </div>
                        <mdui-linear-progress id="progress-bar"></mdui-linear-progress>
                    </div>
                </div>
            </div>

            <footer>
                <div class="mdui-typo-body-medium" data-i18n="footerCopy">© 2026 Knowledge Garden</div>
            </footer>
        </mdui-layout-main>
    </mdui-layout>

    <script>
        // --- 1. 多语言数据集成 ---
        const i18n = {
            "zh-cn": {
                "title": "知识花园",
                "subtitle": "输入想法或链接，AI 园丁将为您自动总结与关联",
                "inputLabel": "今日所学 / 灵感链接",
                "inputPlaceholder": "粘贴文章链接或输入你的感悟...",
                "btnSubmit": "开始培育 (Sow Seeds)",
                "navSow": "播种灵感",
                "navGarden": "查看花园",
                "footerCopy": "© 2026 知识花园 - 你的数字记忆园林",
                "agent1": "园丁正在阅读内容...",
                "agent2": "正在寻找知识间的联系...",
                "agent3": "正在制定生长方案...",
                "emptyAlert": "请输入内容后再播种哦！"
            },
            "zh-tw": {
                "title": "知識花園",
                "subtitle": "輸入想法或連結，AI 園丁將為您自動總結與關聯",
                "inputLabel": "今日所學 / 靈感連結",
                "inputPlaceholder": "粘貼文章連結或輸入你的感悟...",
                "btnSubmit": "開始培育 (Sow Seeds)",
                "navSow": "播種靈感",
                "navGarden": "查看花園",
                "footerCopy": "© 2026 知識花園 - 你的數字記憶園林",
                "agent1": "園丁正在閱讀內容...",
                "agent2": "正在尋找知識間的聯繫...",
                "agent3": "正在制定生長方案...",
                "emptyAlert": "請輸入內容後再播種哦！"
            },
            "en": {
                "title": "Knowledge Garden",
                "subtitle": "Input ideas or links, let AI gardeners summarize and connect them",
                "inputLabel": "Today's Learning / Link",
                "inputPlaceholder": "Paste a link or type your thoughts...",
                "btnSubmit": "Sow Seeds",
                "navSow": "Sow Seeds",
                "navGarden": "My Garden",
                "footerCopy": "© 2026 Knowledge Garden - Your Digital Memory",
                "agent1": "Gardener is reading...",
                "agent2": "Connecting knowledge nodes...",
                "agent3": "Creating growth plan...",
                "emptyAlert": "Please enter something before sowing!"
            }
        };

        // --- 2. 元素获取 ---
        const drawer = document.getElementById('main-drawer');
        const trigger = document.getElementById('drawer-trigger');
        const langMenu = document.getElementById('language-menu');
        const submitBtn = document.getElementById('submit-btn');
        const inputField = document.getElementById('knowledge-input');
        const statusArea = document.getElementById('status-area');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const statusIcon = document.getElementById('status-icon');

        // --- 3. 核心功能 ---

        function applyLanguage(lang) {
            const data = i18n[lang];
            if (!data) return;

            // 翻译文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key]) el.textContent = data[key];
            });

            // 翻译 MDUI 组件属性
            document.querySelectorAll('[data-i18n-label]').forEach(el => {
                const key = el.getAttribute('data-i18n-label');
                if (data[key]) el.label = data[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (data[key]) el.placeholder = data[key];
            });

            localStorage.setItem('user_lang', lang);
        }

        // 监听语言切换 (MDUI 2 标准 change 事件)
        langMenu.addEventListener('change', (e) => {
            applyLanguage(e.target.value);
        });

        // 侧边栏开关
        trigger.addEventListener('click', () => {
            drawer.opened = !drawer.opened;
        });

        // 提交逻辑
        submitBtn.addEventListener('click', async () => {
            const content = inputField.value.trim();
            const currentLang = localStorage.getItem('user_lang') || 'zh-cn';
            const langPack = i18n[currentLang];

            if (!content) {
                alert(langPack.emptyAlert);
                return;
            }

            submitBtn.disabled = true;
            statusArea.style.display = 'block';
            updateUI(langPack.agent1, 33, "data_exploration");

            try {
                const response = await fetch('/api/grow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content, lang: currentLang })
                });

                const result = await response.json();

                if (result.success === false) {
                    console.error("Debug Info:", result.debug_info);
                    alert(`Error: ${result.error}`);
                    resetUI();
                    return;
                }

                // 进度模拟
                updateUI(langPack.agent2, 66, "hub");
                await new Promise(r => setTimeout(r, 800));
                updateUI(langPack.agent3, 95, "trending_up");
                await new Promise(r => setTimeout(r, 1000));

                // 保存并跳转
                saveToGarden(result.data);
                window.location.href = 'garden.html';

            } catch (err) {
                console.error("Fetch Error:", err);
                alert("Server error, please check backend logs.");
                resetUI();
            }
        });

        function updateUI(text, progress, icon) {
            statusText.innerText = text;
            progressBar.value = progress;
            if (statusIcon) statusIcon.name = icon;
        }

        function resetUI() {
            submitBtn.disabled = false;
            statusArea.style.display = 'none';
        }

        function saveToGarden(data) {
            const garden = JSON.parse(localStorage.getItem('garden_history') || '[]');
            garden.unshift({ ...data, id: Date.now(), created_at: new Date().toLocaleString() });
            localStorage.setItem('garden_history', JSON.stringify(garden));
        }

        // 页面加载初始化
        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('user_lang') || 'zh-cn';
            applyLanguage(savedLang);
        });
    </script>
</body>
</html>
